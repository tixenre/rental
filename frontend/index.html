<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO básico — meta tags se sobrescriben por página vía TanStack Router. -->
    <title>Rambla — Rental, estudio y workshops audiovisuales</title>
    <meta name="description" content="Alquiler de equipos audiovisuales, estudio de foto y video, y workshops de producción en Mar del Plata." />
    <meta name="keywords" content="alquiler equipos cine, rental cámaras Mar del Plata, alquiler lentes, iluminación producciones, estudio foto video" />
    <link rel="canonical" href="https://rambla.house/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn, Slack). -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rambla.house/" />
    <meta property="og:title" content="Rambla — Rental, estudio y workshops audiovisuales" />
    <meta property="og:description" content="Alquiler de equipos audiovisuales, estudio de foto y video, y workshops de producción en Mar del Plata." />
    <meta property="og:image" content="https://rambla.house/og-image.png" />
    <meta property="og:locale" content="es_AR" />
    <meta property="og:site_name" content="Rambla" />

    <!-- Twitter Cards. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rambla — Rental, estudio y workshops audiovisuales" />
    <meta name="twitter:description" content="Alquiler de equipos, estudio y workshops audiovisuales en Mar del Plata." />
    <meta name="twitter:image" content="https://rambla.house/og-image.png" />

    <!-- Structured data: WebSite (identidad canónica del sitio para Google). -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Rambla",
      "url": "https://rambla.house/"
    }
    </script>

    <!-- Structured data: Organization (Google Knowledge Panel). -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Rambla Rental",
      "description": "Alquiler de equipos audiovisuales y estudio de foto/video en Mar del Plata.",
      "url": "https://rambla.house/",
      "telephone": "+5492235852510",
      "email": "ramblarental@gmail.com",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Chaco 1392",
        "addressLocality": "Mar del Plata",
        "addressRegion": "Buenos Aires",
        "postalCode": "7600",
        "addressCountry": "AR"
      },
      "openingHoursSpecification": [
        { "@type": "OpeningHoursSpecification", "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday"], "opens": "10:00", "closes": "19:00" },
        { "@type": "OpeningHoursSpecification", "dayOfWeek": "Saturday", "opens": "10:00", "closes": "14:00" }
      ],
      "priceRange": "$$",
      "image": "https://rambla.house/icon-512.png",
      "sameAs": ["https://instagram.com/ramblarental"]
    }
    </script>

    <!-- Favicon: PNG (todos los browsers modernos lo soportan) + Apple touch icon. -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

    <!-- PWA del back-office. El `scope: /admin/` hace que el navegador sólo
         ofrezca "Instalar" cuando el usuario navega dentro de /admin/* — el
         catálogo público no propone instalación. -->
    <link rel="manifest" href="/manifest-admin.json" />

    <!-- Color del tema para barra del navegador en mobile. -->
    <meta name="theme-color" content="#fbbf24" />

    <!-- Fuentes críticas: Champ Black (H1/display) + TT Commons 400 (body) + JetBrains Mono 400 (precios).
         Self-hosted woff2 subseteados (~16-18KB c/u), servidos desde /public/fonts/ (URL estable, sin
         hash de Vite → el browser deduplica preload + @font-face). `crossorigin` obligatorio para CORS. -->
    <link rel="preload" href="/fonts/woff2/champ-black-900.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/woff2/tt-commons-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/woff2/tt-commons-500.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/woff2/tt-commons-600.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/woff2/tt-commons-700.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/woff2/jetbrains-mono-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/woff2/jetbrains-mono-500.woff2" as="font" type="font/woff2" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
