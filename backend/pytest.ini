[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    unit: Tests unitarios puros (sin DB, sin red).
    integration: Tests que tocan dependencias externas (DB, R2, HTTP).
