# Linter de Python — gate de CI conservador a propósito: caza BUGS y los errores
# típicos de un refactor que mueve código entre módulos (nombre indefinido,
# import faltante o sin usar, redefinición), NO estilo. Es el equivalente Python
# del gate de eslint del front (MEMORIA "2026-05-25 — Gate de estilo en CI").
# `compileall` (el otro check de Python en CI) NO detecta un nombre indefinido ni
# un import faltante — compila y explota en runtime; ruff sí (F821/F401).
target-version = "py311"

[lint]
# F  = pyflakes: F401 import sin usar, F811 redefinición, F821 nombre indefinido…
# E9 = errores de sintaxis (E999, etc.).
select = ["F", "E9"]
# F841 (variable local asignada sin usar): hay 3 pre-existentes en módulos de
# lógica (ej. `prev_str` en services/specs_ingesta/parsers/normalizar.py). Se
# difiere a una revisión aparte para no mezclar edits de lógica con este
# cambio de CI; no es un riesgo de refactor.
ignore = ["F841"]

[lint.per-file-ignores]
# Alembic autogenera `from alembic import op` / `import sqlalchemy as sa` aunque
# una migración puntual no los use → no romper el CI por un import de template.
"migrations/versions/*.py" = ["F401"]
