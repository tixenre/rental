<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rambla Rental — Mobile (UI kit)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="../../assets/favicon-512.png">
<link rel="stylesheet" href="styles.css">
<style>
  /* Page chrome around the phone */
  body {
    background: #1a1715;
    min-height: 100vh;
    margin: 0;
    padding: 40px 20px;
    display: flex;
    justify-content: center;
    font-family: var(--font-sans);
  }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .stage .caption {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
    color: rgba(255,255,255,.55);
  }
  /* Override styles inside the iframe-equivalent shell — we mount the app
     inside a fixed-width container so the @media (max-width: 720px) styles
     in styles.css kick in. */
  .phone-shell {
    width: 390px;
    height: 800px;
    border-radius: 48px;
    background: #000;
    padding: 12px;
    box-shadow: 0 24px 60px -16px rgba(0,0,0,.6), inset 0 0 0 1px rgba(255,255,255,.06);
    position: relative;
  }
  .phone-shell::before {
    content: "";
    position: absolute;
    top: 22px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 32px;
    background: #000;
    border-radius: 18px;
    z-index: 10;
  }
  .phone-screen {
    border-radius: 38px;
    overflow: hidden;
    width: 100%; height: 100%;
    background: var(--background);
    position: relative;
    overflow-y: auto;
    overflow-x: hidden;
  }
  /* Status bar */
  .status-bar {
    position: sticky; top: 0; z-index: 50;
    height: 44px;
    display: flex; align-items: flex-end; justify-content: space-between;
    padding: 0 22px 4px;
    font-family: "TT Commons", system-ui, sans-serif;
    font-size: 14px; font-weight: 600;
    color: var(--ink);
    background: color-mix(in oklch, var(--background) 92%, transparent);
    backdrop-filter: blur(20px);
    pointer-events: none;
  }
  .status-bar .icons { display: flex; gap: 5px; align-items: center; }
  .status-bar svg { width: 14px; height: 14px; }
  /* Home indicator */
  .home-bar {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px; border-radius: 3px; background: #fff; opacity: .9;
  }
  /* App container — narrows so the mobile media query is triggered */
  #root { display: block; width: 100%; min-height: calc(100% - 44px); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div class="stage">
  <div class="caption">iPhone · 390 × 800</div>
  <div class="phone-shell">
    <div class="phone-screen">
      <div class="status-bar">
        <span class="tabular">9:41</span>
        <span class="icons">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 17h2v3H2zM6 14h2v6H6zM10 11h2v9h-2zM14 8h2v12h-2zM18 5h2v15h-2z"/></svg>
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4C7 4 2.5 6 0 9l3 3c2.5-2.5 5.5-4 9-4s6.5 1.5 9 4l3-3c-2.5-3-7-5-12-5zm0 7c-3 0-5.5 1-7.5 3l3 3c1-1 2.5-2 4.5-2s3.5 1 4.5 2l3-3c-2-2-4.5-3-7.5-3zm0 6c-1 0-1.5.5-1.5 1.5S11 20 12 20s1.5-.5 1.5-1.5S13 17 12 17z"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <rect x="2" y="7" width="18" height="10" rx="2"/>
            <rect x="4" y="9" width="14" height="6" rx="0.5" fill="currentColor"/>
            <path d="M22 11v2"/>
          </svg>
        </span>
      </div>
      <div id="root"></div>
    </div>
    <div class="home-bar"></div>
  </div>
  <div class="caption">scroll para ver toda la página</div>
</div>

<script src="data.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel">
const { useState, useMemo } = React;

function App() {
  const [mode, setMode] = useState("list"); // mobile defaults to list
  const [query, setQuery] = useState("");
  const [selectedCat, setSelectedCat] = useState(null);
  const [selectedBrand, setSelectedBrand] = useState(null);
  const [cart, setCart] = useState({});
  const [cartOpen, setCartOpen] = useState(false);
  const [openedItemId, setOpenedItemId] = useState(null);

  const hasDates = true;
  const jornadas = 3;
  const dateLabel = "Jue 15 may → Sáb 17 may";

  const cartCount = Object.values(cart).reduce((a, b) => a + b, 0);

  const filtered = useMemo(() => {
    const q = query.trim().toLowerCase();
    return EQUIPMENT.filter((e) => {
      if (selectedCat && e.category !== selectedCat) return false;
      if (selectedBrand && e.brand !== selectedBrand) return false;
      if (q) {
        const hay = `${e.name} ${e.brand} ${e.category}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }, [query, selectedCat, selectedBrand]);

  const counts = useMemo(() => {
    const c = {};
    EQUIPMENT.forEach((e) => { c[e.category] = (c[e.category] || 0) + 1; });
    return c;
  }, []);

  const onAdd = (id) => setCart((c) => ({ ...c, [id]: (c[id] || 0) + 1 }));
  const onRemove = (id) => setCart((c) => {
    const next = { ...c };
    if ((next[id] || 0) <= 1) delete next[id];
    else next[id] -= 1;
    return next;
  });

  const openedItem = openedItemId ? EQUIPMENT.find((e) => e.id === openedItemId) : null;

  if (openedItem) {
    return (
      <div className="app has-minibar">
        <TopBar cartCount={cartCount} onCartOpen={() => setCartOpen(true)} onDateOpen={() => {}} hasDates={hasDates} dateLabel={dateLabel} jornadas={jornadas} />
        <main>
          <Ficha item={openedItem} qty={cart[openedItem.id] || 0} onAdd={onAdd} onRemove={onRemove} onBack={() => setOpenedItemId(null)} jornadas={jornadas} />
        </main>
        <Footer />
        <CartDrawer open={cartOpen} onClose={() => setCartOpen(false)} cart={cart} equipment={EQUIPMENT} onAdd={onAdd} onRemove={onRemove} jornadas={jornadas} />
        <CartMiniBar cart={cart} equipment={EQUIPMENT} jornadas={jornadas} onOpen={() => setCartOpen(true)} />
      </div>
    );
  }

  const onOpenItem = (id) => { setOpenedItemId(id); };

  return (
    <div className="app has-minibar">
      <TopBar cartCount={cartCount} onCartOpen={() => setCartOpen(true)} onDateOpen={() => {}} hasDates={hasDates} dateLabel={dateLabel} jornadas={jornadas} />
      <main>
        <Hero />
        <SubToolbar mode={mode} setMode={setMode} query={query} setQuery={setQuery} visibleCount={filtered.length} total={EQUIPMENT.length} />

        {mode === "grid" && !selectedCat && !selectedBrand && !query.trim() && (
          <>
            <CategoryMosaic categories={CATEGORIES} selected={selectedCat} onSelect={setSelectedCat} counts={counts} />
            <BrandRow brands={BRANDS} selected={selectedBrand} onSelect={setSelectedBrand} />
          </>
        )}

        {mode === "list" ? (
          <ListView items={filtered} cart={cart} onAdd={onAdd} onRemove={onRemove} onOpen={onOpenItem} />
        ) : (
          (selectedCat ? [selectedCat] : CATEGORIES).map((c) => {
            const items = filtered.filter((e) => e.category === c);
            return (
              <CategoryCarousel key={c} category={c} items={items} cart={cart} onAdd={onAdd} onRemove={onRemove} onOpen={onOpenItem} />
            );
          })
        )}
      </main>
      <Footer />
      <CartDrawer open={cartOpen} onClose={() => setCartOpen(false)} cart={cart} equipment={EQUIPMENT} onAdd={onAdd} onRemove={onRemove} jornadas={jornadas} />
      <CartMiniBar cart={cart} equipment={EQUIPMENT} jornadas={jornadas} onOpen={() => setCartOpen(true)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
