<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Components · Pills & chips</title>
<link rel="stylesheet" href="_card.css">
<style>
.card { background: var(--background); }
.row { gap: 8px; align-items: center; flex-wrap: wrap; }
.chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 9999px; font-size: 12px; font-family: var(--font-sans); border: 1px solid var(--hairline); background: var(--surface); color: var(--ink); }
.chip:hover { border-color: var(--ink); }
.chip.active { background: var(--ink); color: var(--amber); border-color: var(--ink); }
.chip.amber  { background: var(--amber-soft); color: var(--ink); border-color: color-mix(in oklch, var(--amber) 50%, transparent); }
.chip.x { cursor: pointer; }
.chip.x .close { opacity: .6; }
.pill-date { display: inline-flex; align-items: center; gap: 10px; padding: 8px 18px; border-radius: 9999px; border: 2px solid color-mix(in oklch, var(--amber) 50%, transparent); background: var(--amber-soft); font-weight: 600; font-family: var(--font-sans); font-size: 13px; color: var(--ink); }
.pill-date .icon { display:inline-grid; place-items:center; width: 16px; height: 16px; }
.pill-date svg { width: 14px; height: 14px; color: var(--amber); }
.eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted-foreground); }
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Category filter chips</div>
    <div class="row">
      <span class="chip">Cámaras</span>
      <span class="chip">Lentes</span>
      <span class="chip active">Iluminación ×</span>
      <span class="chip">Audio</span>
      <span class="chip">Soportes</span>
      <span class="chip amber">Canon ×</span>
    </div>
    <div class="eyebrow">Date pill (TopBar)</div>
    <div class="row">
      <span class="pill-date">
        <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span>
        Jue 15 may 10:00 → Sáb 17 may 18:00
        <span style="opacity:.55; font-family: var(--font-mono); font-size: 10px;">· 3 jornadas</span>
      </span>
    </div>
  </div>
</body>
</html>
