<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colors · Functional</title>
<link rel="stylesheet" href="_card.css">
<style>
.card { background: var(--background); }
.grid { grid-template-columns: repeat(3, 1fr); }
.swatch { min-height: 116px; color: white; }
.swatch.warning { color: var(--ink); }
.destructive { background: var(--destructive); }
.success     { background: var(--rbl-verde);   color: var(--ink); }
.warning     { background: var(--rbl-naranja); }
</style>
</head>
<body>
  <div class="card">
    <div class="grid">
      <div class="swatch destructive">
        <div class="label">Destructive</div>
        <div class="token">errors · delete</div>
      </div>
      <div class="swatch success">
        <div class="label">Success</div>
        <div class="token">verde · confirmed</div>
      </div>
      <div class="swatch warning">
        <div class="label">Warning</div>
        <div class="token">naranja · pending</div>
      </div>
    </div>
  </div>
</body>
</html>
