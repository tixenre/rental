<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colors · Secondary palette</title>
<link rel="stylesheet" href="_card.css">
<style>
.card { background: var(--background); padding: 18px 22px; }
.grid { grid-template-columns: repeat(4, 1fr); }
.swatch { min-height: 140px; padding: 14px; gap: 4px; color: #FFFFFF; }
.swatch .name { font-family: var(--font-sans); font-weight: 600; font-size: 14px; letter-spacing: -0.01em; }
.swatch .meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; line-height: 1.7; margin-top: auto; opacity: .9; }
.swatch .meta .hex { font-size: 12px; letter-spacing: 0.04em; opacity: 1; }
.rosa    { background: #ED7BAD; }
.naranja { background: #E9552F; }
.azul    { background: #1097DB; }
.verde   { background: #009971; }
</style>
</head>
<body>
  <div class="card">
    <div class="grid">
      <div class="swatch rosa">
        <div class="name">Rosa</div>
        <div class="meta"><div class="hex">#ED7BAD</div>PANTONE 211 C<br>RGB 237 · 123 · 173</div>
      </div>
      <div class="swatch naranja">
        <div class="name">Naranja</div>
        <div class="meta"><div class="hex">#E9552F</div>PANTONE 172 C<br>RGB 233 · 85 · 47</div>
      </div>
      <div class="swatch azul">
        <div class="name">Azul</div>
        <div class="meta"><div class="hex">#1097DB</div>PANTONE 299 C<br>RGB 16 · 151 · 219</div>
      </div>
      <div class="swatch verde">
        <div class="name">Verde</div>
        <div class="meta"><div class="hex">#009971</div>PANTONE 7724 C<br>RGB 0 · 153 · 113</div>
      </div>
    </div>
  </div>
</body>
</html>
