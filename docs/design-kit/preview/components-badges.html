<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Components · Badges</title>
<link rel="stylesheet" href="_card.css">
<style>
.card { background: var(--background); }
.row { gap: 10px; align-items: center; flex-wrap: wrap; }
.badge { display:inline-flex; align-items:center; gap:5px; padding: 3px 9px; border-radius: 9999px; font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.badge-new { background: var(--ink); color: var(--amber); }
.badge-destacado { background: color-mix(in oklch, var(--amber) 90%, transparent); color: var(--ink); }
.badge-selected { width: 22px; height: 22px; padding: 0; border-radius: 9999px; background: var(--amber); color: var(--ink); display: inline-grid; place-items: center; }
.badge-stock-low { background: transparent; border: 1px solid var(--hairline); color: var(--rbl-naranja); }
.badge-stock-out { background: var(--surface); color: var(--muted-foreground); border: 1px solid var(--hairline); }
.badge-status { background: var(--rbl-verde); color: var(--ink); }
.badge-warning { background: var(--rbl-naranja); color: var(--ink); }
.badge-amber-tape { background: repeating-linear-gradient(-45deg, var(--amber) 0 8px, var(--rbl-amber-hot) 8px 16px); color: var(--ink); }
.eyebrow { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted-foreground); margin-top: 4px;}
</style>
</head>
<body>
  <div class="card">
    <div class="row">
      <span class="badge badge-new">✦ nuevo</span>
      <span class="badge badge-destacado">★ destacado</span>
      <span class="badge-selected"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
      <span class="badge badge-stock-low">2 disp.</span>
      <span class="badge badge-stock-out">Sin stock</span>
      <span class="badge badge-status">Confirmado</span>
      <span class="badge badge-warning">Pendiente</span>
      <span class="badge badge-amber-tape">Espacio Rambla</span>
    </div>
    <div class="eyebrow">nuevo · destacado · selected · stock · pedido status · tape addon</div>
  </div>
</body>
</html>
