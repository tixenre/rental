<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Components · Estado badges (pedidos)</title>
<link rel="stylesheet" href="_card.css">
<style>
.card { background: var(--background); }
.row { gap: 8px; align-items: center; flex-wrap: wrap; }
.estado-badge {
  display: inline-flex; align-items: center;
  padding: 3px 9px; border-radius: 9999px;
  font-family: var(--font-mono); font-size: 9px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
}
.estado-badge.borrador    { background: var(--muted); color: var(--muted-foreground); }
.estado-badge.presupuesto { background: #dbeafe; color: #1d4ed8; }
.estado-badge.solicitado  { background: #fef3c7; color: #92400e; }
.estado-badge.confirmado  { background: #dcfce7; color: #166534; }
.estado-badge.entregado   { background: #bbf7d0; color: #14532d; }
.estado-badge.devuelto    { background: #e2e8f0; color: #475569; }
.estado-badge.finalizado  { background: #e2e8f0; color: #475569; }
.estado-badge.cancelado   { background: #fee2e2; color: #991b1b; }
.eyebrow { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted-foreground); }
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Pedido — order status flow</div>
    <div class="row">
      <span class="estado-badge borrador">Borrador</span>
      <span class="estado-badge presupuesto">Presupuesto</span>
      <span class="estado-badge solicitado">Solicitado</span>
      <span class="estado-badge confirmado">Confirmado</span>
      <span class="estado-badge entregado">Entregado</span>
      <span class="estado-badge devuelto">Devuelto</span>
      <span class="estado-badge finalizado">Finalizado</span>
      <span class="estado-badge cancelado">Cancelado</span>
    </div>
    <div class="eyebrow">Each color encodes a phase: idle → quoted → active → archived → killed</div>
  </div>
</body>
</html>
