<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brand · Logo lockup</title>
<link rel="stylesheet" href="_card.css">
<style>
.card { background: var(--background); padding: 22px 24px; }
.row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; align-items: stretch; }
.cell { display: flex; flex-direction: column; align-items: center; justify-content: space-between; gap: 14px; padding: 18px 14px 14px; border: 1px solid var(--hairline); border-radius: var(--radius-md); background: var(--surface); }
.cell .stage { flex: 1; display: grid; place-items: center; width: 100%; }
.cell img.wm-rental { height: 64px; width: auto; }
.cell img.wm-only   { height: 56px; width: auto; }
.cell img.seal      { height: 88px; width: auto; }
.cap { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted-foreground); text-align: center; }
</style>
</head>
<body>
  <div class="card">
    <div class="row">
      <div class="cell">
        <div class="stage"><img class="wm-rental" src="../assets/rambla-wordmark.webp" alt="Rambla Rental"></div>
        <div class="cap">Logotipo principal</div>
      </div>
      <div class="cell">
        <div class="stage"><img class="wm-only" src="../assets/rambla-wordmark-only.png" alt="rambla"></div>
        <div class="cap">Wordmark solo</div>
      </div>
      <div class="cell">
        <div class="stage"><img class="seal" src="../assets/rambla-icon-r.png" alt="R seal"></div>
        <div class="cap">Aplicación secundaria · inicial</div>
      </div>
    </div>
  </div>
</body>
</html>
