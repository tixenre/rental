<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type · Body</title>
<link rel="stylesheet" href="_card.css">
<style>
.card { background: var(--background); }
.row { gap: 24px; align-items: flex-start; }
.col-body { flex: 1; }
.body { font-family: var(--font-sans); font-size: 16px; line-height: 1.55; color: var(--foreground); max-width: 460px; }
.small { font-family: var(--font-sans); font-size: 13px; line-height: 1.5; color: var(--muted-foreground); margin-top: 6px; max-width: 460px; }
.meta-r { text-align: right; min-width: 150px; }
</style>
</head>
<body>
  <div class="card">
    <div class="row">
      <div class="col-body">
        <div class="body">Cámaras, ópticas, luces, audio y soportes para producciones audiovisuales. Elegí fechas y armá tu pedido — te lo dejamos listo para retirar.</div>
        <div class="small">Mínimo 4 horas. Te confirmamos disponibilidad por WhatsApp — generalmente respondemos en el día.</div>
      </div>
      <div class="meta-r">
        <div class="label subtle">Inter Tight · 400 / 500</div>
        <div class="token">body 16 · small 13</div>
      </div>
    </div>
  </div>
</body>
</html>
