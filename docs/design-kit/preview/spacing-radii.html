<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spacing · Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
.card { background: var(--background); }
.row { gap: 16px; align-items: flex-end; }
.r { background: var(--ink); width: 70px; height: 70px; display:flex; align-items:flex-end; justify-content:center; padding-bottom: 6px; color: var(--amber); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
.r.full { width: 70px; height: 36px; border-radius: 9999px; align-items:center; padding-bottom: 0; }
.cap { font-family: var(--font-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted-foreground); margin-top: 6px; text-align: center; }
.stack { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
  <div class="card">
    <div class="row">
      <div class="stack"><div class="r" style="border-radius: 4px;">4</div><div class="cap">sm · inputs</div></div>
      <div class="stack"><div class="r" style="border-radius: 8px;">8</div><div class="cap">md · buttons</div></div>
      <div class="stack"><div class="r" style="border-radius: 12px;">12</div><div class="cap">lg · cards</div></div>
      <div class="stack"><div class="r" style="border-radius: 16px;">16</div><div class="cap">xl · surface</div></div>
      <div class="stack"><div class="r" style="border-radius: 24px;">24</div><div class="cap">2xl · hero</div></div>
      <div class="stack"><div class="r full">pill</div><div class="cap">full · chips, CTA</div></div>
    </div>
  </div>
</body>
</html>
