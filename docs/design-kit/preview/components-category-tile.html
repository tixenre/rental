<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Components · Category tile</title>
<link rel="stylesheet" href="_card.css">
<style>
.card { background: var(--background); }
.row { gap: 12px; }
.tile {
  width: 150px; padding: 14px;
  border: 1px solid var(--hairline); border-radius: 12px;
  background: var(--surface);
  display: flex; flex-direction: column; gap: 12px;
  transition: all .15s;
}
.tile.hover { background: var(--amber-soft); border-color: var(--ink); transform: translateY(-2px); }
.tile.hover .icon { background: var(--amber); color: var(--ink); }
.icon {
  width: 44px; height: 44px; border-radius: 8px;
  background: var(--amber-soft); color: var(--amber);
  display: grid; place-items: center; transition: all .15s;
}
.icon svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
.name {
  font-family: var(--font-sans); font-weight: 600;
  font-size: 15px; color: var(--ink); line-height: 1.1;
  letter-spacing: -0.005em;
}
.count {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--muted-foreground); font-variant-numeric: tabular-nums;
  text-align: right;
}
.bot { display: flex; justify-content: space-between; align-items: baseline; }
.cap { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted-foreground); margin-top: 4px; }
</style>
</head>
<body>
  <div class="card">
    <div class="cap">Nombre: TT Commons DemiBold (600), no display</div>
    <div class="row">
      <div class="tile">
        <div class="icon"><svg viewBox="0 0 24 24"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3.5"/></svg></div>
        <div class="bot"><div class="name">Cámaras</div><div class="count">42</div></div>
      </div>
      <div class="tile hover">
        <div class="icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="m14.31 8 5.74 9.94M9.69 8h11.48M7.38 12l5.74-9.94M9.69 16 3.95 6.06M14.31 16H2.83M16.62 12l-5.74 9.94"/></svg></div>
        <div class="bot"><div class="name">Lentes</div><div class="count">68</div></div>
      </div>
      <div class="tile">
        <div class="icon"><svg viewBox="0 0 24 24"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6M10 22h4"/></svg></div>
        <div class="bot"><div class="name">Iluminación</div><div class="count">24</div></div>
      </div>
      <div class="tile">
        <div class="icon"><svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="13" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3M8 22h8"/></svg></div>
        <div class="bot"><div class="name">Audio</div><div class="count">15</div></div>
      </div>
    </div>
  </div>
</body>
</html>
