<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Iconography · Category illustrations</title>
<link rel="stylesheet" href="_card.css">
<style>
.card { background: var(--background); padding: 18px 22px; }
.row { gap: 10px; flex-wrap: wrap; }
.cell { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 14px 12px; border: 1px solid var(--hairline); border-radius: 12px; background: var(--surface); color: var(--amber); width: 84px; }
.cell svg { width: 32px; height: 32px; fill: none; stroke: currentColor; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }
.lbl { font-family: var(--font-sans); font-weight: 600; font-size: 12px; color: var(--ink); text-align: center; letter-spacing: -0.005em; }
.cap { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted-foreground); margin-top: 2px; }
</style>
</head>
<body>
  <div class="card">
    <div class="cap">Iconos finos · stroke 1.4 · más contemporáneos</div>
    <div class="row">
      <!-- Cámaras: minimal mirrorless body -->
      <div class="cell">
        <svg viewBox="0 0 32 32">
          <path d="M4 11h4l1.5-2.5h13L24 11h4a1.5 1.5 0 0 1 1.5 1.5v10A1.5 1.5 0 0 1 28 24H4a1.5 1.5 0 0 1-1.5-1.5v-10A1.5 1.5 0 0 1 4 11z"/>
          <circle cx="16" cy="17" r="4.5"/>
          <circle cx="25" cy="13.5" r=".7" fill="currentColor"/>
        </svg>
        <div class="lbl">Cámaras</div>
      </div>
      <!-- Lentes: aperture, simple -->
      <div class="cell">
        <svg viewBox="0 0 32 32">
          <circle cx="16" cy="16" r="10"/>
          <path d="M16 6 24.66 21M16 6 7.34 21M7.34 21h17.32M5 16h10.39L7.34 11M27 16H16.61L24.66 11"/>
        </svg>
        <div class="lbl">Lentes</div>
      </div>
      <!-- Iluminación: panel + stand -->
      <div class="cell">
        <svg viewBox="0 0 32 32">
          <rect x="7" y="4" width="18" height="11" rx="1.5"/>
          <path d="M16 15v4M11 19h10M16 19l-4 9M16 19l4 9"/>
        </svg>
        <div class="lbl">Iluminación</div>
      </div>
      <!-- Audio: shotgun mic with windscreen -->
      <div class="cell">
        <svg viewBox="0 0 32 32">
          <path d="M5 14a3 3 0 0 1 3-3h11l5-3.5V24.5L19 21H8a3 3 0 0 1-3-3v-4z"/>
          <path d="M8 14v4M11 13v6M14 13v6M17 13v6"/>
        </svg>
        <div class="lbl">Audio</div>
      </div>
      <!-- Soportes: tripod -->
      <div class="cell">
        <svg viewBox="0 0 32 32">
          <circle cx="16" cy="6" r="1.4"/>
          <path d="M16 7.4V13"/>
          <path d="M13 13h6"/>
          <path d="M16 13 6 28M16 13 26 28M11 22h10"/>
        </svg>
        <div class="lbl">Soportes</div>
      </div>
      <!-- Accesorios: clapperboard -->
      <div class="cell">
        <svg viewBox="0 0 32 32">
          <rect x="3" y="8" width="26" height="18" rx="2"/>
          <path d="m3.6 13.2 24.8-3.4"/>
          <path d="m7 8.5-1.6 4.5M12 7.8 10.4 12.3M17 7-15.4 11.7M17 7.1l-1.6 4.5M22 6.4l-1.6 4.5M27 5.7l-1.6 4.5"/>
        </svg>
        <div class="lbl">Accesorios</div>
      </div>
      <!-- Adaptadores: cable -->
      <div class="cell">
        <svg viewBox="0 0 32 32">
          <rect x="3" y="13" width="6" height="6" rx="1"/>
          <rect x="23" y="13" width="6" height="6" rx="1"/>
          <path d="M9 16c4 0 4 7 8 7s4-7 8-7"/>
          <path d="M5 13v-2M7 13v-2M25 13v-2M27 13v-2"/>
        </svg>
        <div class="lbl">Adaptadores</div>
      </div>
    </div>
  </div>
</body>
</html>
