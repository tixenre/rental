<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Components · Equipment cards</title>
<link rel="stylesheet" href="_card.css">
<style>
.card { background: var(--background); padding: 18px 22px; }
.row { gap: 14px; }
.eq {
  width: 210px;
  border: 1px solid var(--hairline);
  border-radius: 10px;
  overflow: hidden;
  background: var(--surface);
  display: flex; flex-direction: column;
}
.eq.selected { border-color: color-mix(in oklch, var(--amber) 60%, transparent); box-shadow: 0 0 0 1px var(--amber); }
.eq.sin-stock { opacity: .5; }
.eq .photo {
  aspect-ratio: 1; background: white; position: relative;
  display: grid; place-items: center; padding: 18px;
}
.eq .photo .placeholder {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, var(--amber-soft), var(--surface) 60%, var(--amber-soft));
  border-radius: 6px;
  display: grid; place-items: center;
  font-family: var(--font-sans); font-weight: 700;
  font-size: 22px; letter-spacing: -0.01em;
  color: color-mix(in oklch, var(--ink) 32%, transparent);
}
.eq .badge-new {
  position: absolute; top: 8px; left: 8px;
  background: var(--ink); color: var(--amber);
  padding: 3px 8px; border-radius: 9999px;
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: 0.18em; text-transform: uppercase;
}
.eq .badge-check {
  position: absolute; top: 8px; right: 8px;
  width: 22px; height: 22px; background: var(--amber); color: var(--ink);
  border-radius: 50%; display: grid; place-items: center;
}
.eq .badge-check svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
.eq .sin-overlay { position: absolute; inset:0; display:grid; place-items:center; background: color-mix(in oklch, var(--background) 70%, transparent); }
.eq .sin-pill {
  background: var(--background); border: 1px solid var(--hairline);
  padding: 4px 12px;
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--muted-foreground); border-radius: 9999px;
}

/* Info section — vertical layout, qty bar BELOW the meta */
.eq .info {
  padding: 10px 12px 11px;
  display: flex; flex-direction: column; gap: 8px;
  flex: 1; min-height: 0;
}
.eq .brand {
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--muted-foreground);
}
.eq .name {
  font-family: var(--font-sans); font-weight: 500;
  font-size: 13.5px; line-height: 1.3; color: var(--ink);
  letter-spacing: -0.005em;
  overflow: hidden; display: -webkit-box; -webkit-box-orient: vertical;
  -webkit-line-clamp: 2;
}

.eq .row-bottom {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.eq .price-block { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
.eq .price {
  font-family: var(--font-sans); font-weight: 600;
  font-size: 14px; font-variant-numeric: tabular-nums;
  color: var(--ink); letter-spacing: -0.01em; line-height: 1;
}
.eq .per {
  font-family: var(--font-mono); font-size: 9px;
  text-transform: uppercase; letter-spacing: 0.18em;
  color: var(--muted-foreground); line-height: 1.4;
}
.eq .add {
  width: 32px; height: 32px; flex-shrink: 0;
  border-radius: 8px; background: transparent;
  border: 1px solid var(--hairline); color: var(--ink); cursor: pointer;
  display: grid; place-items: center;
}
.eq .add:hover { background: var(--amber); border-color: var(--amber); }
.eq .add[disabled] { opacity: .4; cursor: not-allowed; }
.eq .add svg { width: 14px; height: 14px; }
.eq .qty {
  display: flex; align-items: center; gap: 0; padding: 2px;
  border: 1px solid color-mix(in oklch, var(--amber) 50%, transparent);
  background: var(--amber-soft); border-radius: 8px;
}
.eq .qty button { width: 28px; height: 28px; border: 0; background: transparent; color: var(--amber); cursor: pointer; border-radius: 4px; display:grid; place-items:center; }
.eq .qty .num { width: 22px; text-align: center; font-family: var(--font-mono); font-size: 12px; color: var(--ink); }
.svg-icon { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; width: 14px; height: 14px; }
.eq .stock {
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: 0.18em; text-transform: uppercase;
  font-variant-numeric: tabular-nums;
  color: var(--muted-foreground);
}
.eq .stock.low { color: var(--rbl-naranja); }
.eq .stock.out { color: var(--destructive); }
</style>
</head>
<body>
  <div class="card">
    <div class="row">
      <!-- default -->
      <div class="eq">
        <div class="photo">
          <span class="badge-new">✦ nuevo</span>
          <div class="placeholder">FX3</div>
        </div>
        <div class="info">
          <div class="name">Cámara Sony FX3 Montura E Full-Frame</div>
          <div class="row-bottom">
            <div class="price-block">
              <span class="price">$ 38.000</span>
              <span class="per">por jornada · 2 disp.</span>
            </div>
            <button class="add"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
          </div>
        </div>
      </div>

      <!-- selected -->
      <div class="eq selected">
        <div class="photo">
          <div class="badge-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="placeholder">24-70</div>
        </div>
        <div class="info">
          <div class="name">Lente Canon RF 24-70mm f/2.8 L Montura RF</div>
          <div class="row-bottom">
            <div class="price-block">
              <span class="price">$ 22.500</span>
              <span class="per">por jornada</span>
            </div>
            <div class="qty">
              <button><svg class="svg-icon" viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>
              <span class="num">2</span>
              <button><svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
            </div>
          </div>
        </div>
      </div>

      <!-- sin stock -->
      <div class="eq sin-stock">
        <div class="photo">
          <div class="placeholder">600x</div>
          <div class="sin-overlay"><div class="sin-pill">Sin stock</div></div>
        </div>
        <div class="info">
          <div class="name">Luz Aputure 600x Pro Bicolor</div>
          <div class="row-bottom">
            <div class="price-block">
              <span class="price">$ 18.000</span>
              <span class="per stock out">sin stock</span>
            </div>
            <button class="add" disabled><svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
