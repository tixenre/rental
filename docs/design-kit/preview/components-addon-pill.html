<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Components · Addon pill (incluye)</title>
<link rel="stylesheet" href="_card.css">
<style>
.card { background: var(--background); }
.row { gap: 6px; align-items: center; flex-wrap: wrap; }
.addon-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 4px 3px 8px; border-radius: 9999px;
  background: color-mix(in oklch, var(--amber) 14%, transparent);
  font-family: var(--font-sans); font-size: 11px; font-weight: 500;
  color: var(--ink); white-space: nowrap;
}
.addon-pill::before {
  content: "✓";
  color: color-mix(in oklch, var(--amber) 80%, var(--ink));
  font-size: 9px; font-weight: 700;
}
.addon-pill-qty {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 16px; padding: 0 4px;
  border-radius: 9999px;
  background: var(--ink); color: var(--amber);
  font-family: var(--font-mono); font-size: 9px; font-weight: 700;
  margin-left: 2px;
}
.addon-pill-more {
  background: transparent;
  border: 1px dashed color-mix(in oklch, var(--ink) 25%, transparent);
  color: var(--muted-foreground); font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.05em; padding: 3px 8px;
}
.addon-pill-more::before { content: none; }
.addon-pill-empty {
  color: var(--muted-foreground); font-style: italic;
  font-size: 11px; opacity: 0.6; padding: 3px 0;
}
.eyebrow { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted-foreground); }
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Addons "incluye" — kit contents on equipment rows</div>
    <div class="row">
      <span class="addon-pill">Cuerpo</span>
      <span class="addon-pill">Batería NP-FZ100 <span class="addon-pill-qty">×2</span></span>
      <span class="addon-pill">Cargador dual</span>
      <span class="addon-pill addon-pill-more">+3</span>
    </div>
    <div class="eyebrow">No addons</div>
    <div class="row">
      <span class="addon-pill-empty">solo cuerpo</span>
    </div>
    <div class="eyebrow">Pattern: amber-soft bg · ✓ prefix · ink/amber qty badge on right · dashed "more" pill · italic "empty" fallback</div>
  </div>
</body>
</html>
