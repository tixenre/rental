<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Components · Stat card</title>
<link rel="stylesheet" href="_card.css">
<style>
.card { background: var(--background); }
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.stat-card {
  padding: 14px 16px; border-radius: var(--radius-lg);
  border: 1px solid var(--hairline); background: var(--surface);
}
.stat-label {
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--muted-foreground);
}
.stat-value {
  font-family: var(--font-display); font-size: 28px; font-weight: 900; color: var(--ink);
  font-variant-numeric: tabular-nums; line-height: 1; margin-top: 6px;
  letter-spacing: -0.01em;
}
.stat-value.verde { color: var(--rbl-verde); }
.stat-meta { font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); margin-top: 4px; }
.eyebrow { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted-foreground); }
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Stat card — KPI tiles para portal cliente / admin dashboard</div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Activos</div>
        <div class="stat-value">3</div>
        <div class="stat-meta">$ 187.500 en rentals</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">A pagar</div>
        <div class="stat-value verde">$ 0</div>
        <div class="stat-meta">todo al día</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Histórico</div>
        <div class="stat-value">12</div>
        <div class="stat-meta">pedidos completados</div>
      </div>
    </div>
    <div class="eyebrow">Structure: mono label (uppercase) → display value (tabular) → mono meta (color-coded for positive/neutral)</div>
  </div>
</body>
</html>
