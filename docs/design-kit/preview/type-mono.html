<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type · Mono + eyebrow</title>
<link rel="stylesheet" href="_card.css">
<style>
.card { background: var(--background); }
.row { gap: 24px; align-items: stretch; }
.col { flex: 1; gap: 8px; }
.eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted-foreground); }
.tabular { font-family: var(--font-mono); font-variant-numeric: tabular-nums; color: var(--ink); font-size: 18px; }
.code { font-family: var(--font-mono); font-size: 12px; color: var(--ink); background: var(--surface); padding: 6px 10px; border-radius: var(--radius-sm); display: inline-block; }
.divider { width: 1px; background: var(--hairline); }
.meta-r { text-align: right; }
</style>
</head>
<body>
  <div class="card">
    <div class="row">
      <div class="col">
        <div class="eyebrow">Catálogo · 187 equipos · Mar del Plata</div>
        <div class="eyebrow">Buscá por · Categorías</div>
        <div class="eyebrow">© 2026 Rambla Rental</div>
      </div>
      <div class="divider"></div>
      <div class="col">
        <div class="tabular">$ 24.500 / jornada</div>
        <div class="tabular">EEE 14 MAY · 10:00</div>
        <div class="code">/admin/equipos/categorias</div>
      </div>
      <div class="divider"></div>
      <div class="col" style="justify-content:flex-end;">
        <div class="label subtle">JetBrains Mono · 400/500</div>
        <div class="token">10–13px · tracking 0.22–0.3em</div>
      </div>
    </div>
  </div>
</body>
</html>
