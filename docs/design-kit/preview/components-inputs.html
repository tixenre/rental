<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Components · Form inputs</title>
<link rel="stylesheet" href="_card.css">
<style>
.card { background: var(--background); }
.row { gap: 14px; }
.field { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.lbl { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted-foreground); }
input, select, textarea { font-family: var(--font-sans); border-radius: 6px; border: 1px solid var(--hairline); background: var(--surface-elevated); padding: 8px 10px; font-size: 14px; color: var(--ink); outline: none; }
input:focus { border-color: color-mix(in oklch, var(--amber) 80%, transparent); box-shadow: 0 0 0 3px var(--amber-soft); }
.search { position: relative; }
.search input { padding-left: 32px; border-radius: 9999px; border-width: 2px; }
.search svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--muted-foreground); }
.switch { width: 38px; height: 22px; background: var(--ink); border-radius: 9999px; position: relative; display: inline-block; }
.switch::after { content: ""; position: absolute; top: 3px; left: 18px; width: 16px; height: 16px; background: var(--amber); border-radius: 50%; }
.switch.off { background: var(--surface-2, var(--muted)); }
.switch.off::after { left: 3px; background: var(--muted-foreground); }
.opt { display: inline-flex; gap: 8px; align-items: center; }
</style>
</head>
<body>
  <div class="card">
    <div class="row">
      <div class="field">
        <div class="lbl">Buscar</div>
        <div class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input placeholder="Buscar equipo, marca…" value="Sony FX">
        </div>
      </div>
      <div class="field">
        <div class="lbl">Email</div>
        <input value="hola@productora.com">
      </div>
      <div class="field">
        <div class="lbl">Categoría</div>
        <select><option>Cámaras</option><option>Lentes</option></select>
      </div>
    </div>
    <div class="row" style="gap: 22px; align-items: center;">
      <div class="opt"><span class="lbl">Visible en catálogo</span><span class="switch"></span></div>
      <div class="opt"><span class="lbl">Ficha completa</span><span class="switch off"></span></div>
      <div class="opt">
        <span class="lbl">Cantidad</span>
        <span style="display:inline-flex; align-items:center; gap:4px; padding:2px; border:1px solid color-mix(in oklch, var(--amber) 50%, transparent); border-radius: 8px; background: var(--amber-soft);">
          <button style="border:0; background:transparent; width:24px; height:24px; color: var(--amber);">−</button>
          <span style="font-family: var(--font-mono); width: 16px; text-align: center; font-size:13px;">2</span>
          <button style="border:0; background:transparent; width:24px; height:24px; color: var(--amber);">+</button>
        </span>
      </div>
    </div>
  </div>
</body>
</html>
