<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Flujo de Reserva · Rambla Rental</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#111;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:32px 16px 48px;font-family:var(--font-sans);}

/* ── Phone frame ─────────────────────────────────────────── */
.phone{width:375px;height:812px;background:var(--background);border-radius:50px;border:8px solid #1c1c1e;overflow:hidden;position:relative;box-shadow:0 48px 96px -24px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.07) inset;display:flex;flex-direction:column;}
.status{display:flex;justify-content:space-between;align-items:center;padding:14px 24px 6px;font-family:var(--font-mono);font-size:11px;font-weight:500;color:var(--ink);flex-shrink:0;position:relative;z-index:10;background:var(--background);}
.status-pill{position:absolute;left:50%;transform:translateX(-50%);top:6px;width:90px;height:24px;background:#1c1c1e;border-radius:0 0 18px 18px;}

.viewport{flex:1;position:relative;overflow:hidden;}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;display:flex;flex-direction:column;background:var(--background);}
.screen::-webkit-scrollbar{display:none;}

/* ── Overlays ────────────────────────────────────────────── */
.overlay{position:absolute;inset:0;z-index:60;display:flex;flex-direction:column;background:var(--background);}
.from-bottom{animation:slideUp .3s cubic-bezier(.32,.72,0,1) both;}
.from-right{animation:slideRight .3s cubic-bezier(.32,.72,0,1) both;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes slideRight{from{transform:translateX(100%);}to{transform:translateX(0);}}

/* ── TopBar ──────────────────────────────────────────────── */
.topbar{position:sticky;top:0;z-index:30;background:color-mix(in oklch,var(--background) 93%,transparent);backdrop-filter:blur(20px);border-bottom:1px solid var(--hairline);padding:10px 14px;display:flex;gap:8px;align-items:center;flex-shrink:0;}
.logo{height:26px;width:auto;}
.date-pill{flex:1;min-width:0;display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:9999px;border:2px solid color-mix(in oklch,var(--amber) 45%,transparent);background:color-mix(in oklch,var(--amber) 10%,transparent);font-family:var(--font-sans);font-weight:600;font-size:11.5px;color:var(--ink);cursor:pointer;transition:border-color .15s;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.date-pill:hover{border-color:var(--amber);}
.date-pill .ical{color:var(--amber);flex-shrink:0;}
.date-pill .meta{font-family:var(--font-mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted-foreground);flex-shrink:0;}
.cart-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:9999px;background:var(--ink);color:var(--background);border:0;cursor:pointer;font-family:var(--font-sans);font-size:12px;font-weight:500;flex-shrink:0;transition:background .15s;white-space:nowrap;}
.cart-btn:hover{background:color-mix(in oklch,var(--ink) 82%,var(--amber));}
.cart-btn .n{font-family:var(--font-mono);font-size:11px;font-variant-numeric:tabular-nums;}

/* ── Catalog hero ─────────────────────────────────────────── */
.cat-hero{background:var(--amber);padding:20px 16px 14px;border-bottom:1px solid color-mix(in oklch,var(--ink) 14%,transparent);flex-shrink:0;}
.cat-hero-eye{font-family:var(--font-mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink);opacity:.6;margin-bottom:4px;}
.cat-hero-title{font-family:'Champ Black',serif;font-weight:900;font-size:28px;color:var(--ink-pure, #000);text-transform:lowercase;line-height:.95;}

/* ── Section header ──────────────────────────────────────── */
.section-hd{padding:16px 16px 4px;display:flex;align-items:flex-end;justify-content:space-between;flex-shrink:0;}
.section-wm{font-family:'Champ Black',serif;font-weight:900;font-size:22px;color:var(--ink);text-transform:lowercase;line-height:1;}
.section-eye{font-family:var(--font-mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted-foreground);margin-bottom:4px;}
.section-cnt{font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);}

/* ── Equipment cards ─────────────────────────────────────── */
.equip-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:8px 16px;flex-shrink:0;}
.equip-card{border:1px solid var(--hairline);border-radius:var(--radius-lg, 12px);background:var(--surface-elevated, #fff);overflow:hidden;display:flex;flex-direction:column;}
.equip-thumb{aspect-ratio:4/3;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:34px;position:relative;}
.equip-info{padding:9px;flex:1;display:flex;flex-direction:column;gap:3px;}
.equip-cat{font-family:var(--font-mono);font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-foreground);}
.equip-name{font-family:'Champ Black',serif;font-weight:900;font-size:13px;color:var(--ink);line-height:1.15;text-transform:lowercase;flex:1;}
.equip-price-row{display:flex;align-items:baseline;gap:3px;margin-top:4px;}
.ep-val{font-family:var(--font-mono);font-size:12.5px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums;}
.ep-per{font-family:var(--font-mono);font-size:9px;color:var(--muted-foreground);}
.equip-foot{border-top:1px solid var(--hairline);padding:8px 9px;}
.btn-add{width:100%;height:34px;border-radius:var(--radius-sm, 8px);background:var(--amber);color:var(--ink);border:0;cursor:pointer;font-family:var(--font-sans);font-weight:600;font-size:12px;display:flex;align-items:center;justify-content:center;gap:5px;transition:filter .12s;}
.btn-add:hover{filter:brightness(1.05);}
.qty-ctrl{display:flex;align-items:center;border:1px solid var(--hairline);border-radius:9999px;background:var(--background);width:100%;justify-content:space-between;}
.qty-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:0;background:transparent;cursor:pointer;color:var(--ink);border-radius:50%;}
.qty-btn:hover{background:var(--surface);}
.qty-n{font-family:var(--font-mono);font-size:12px;color:var(--ink);width:22px;text-align:center;font-variant-numeric:tabular-nums;}

/* ── Cart minibar ────────────────────────────────────────── */
.minibar{position:sticky;bottom:0;left:0;right:0;z-index:20;border-top:2px solid color-mix(in oklch,var(--amber) 55%,transparent);background:color-mix(in oklch,var(--background) 98%,transparent);backdrop-filter:blur(24px);padding:10px 16px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 -8px 32px -8px rgba(0,0,0,.14);cursor:pointer;}
.minibar-left{display:flex;flex-direction:column;gap:1px;}
.minibar-eye{font-family:var(--font-mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-foreground);}
.minibar-total{font-family:'Champ Black',serif;font-weight:900;font-size:22px;color:var(--ink);font-variant-numeric:tabular-nums;}
.minibar-cta{height:42px;padding:0 18px;border-radius:var(--radius-md, 10px);background:var(--amber);color:var(--ink);font-family:var(--font-sans);font-weight:600;font-size:12px;border:0;cursor:pointer;display:flex;align-items:center;gap:6px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;flex-shrink:0;}

/* ── Overlay header ──────────────────────────────────────── */
.ovl-head{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--hairline);flex-shrink:0;}
.ovl-eye{font-family:var(--font-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted-foreground);}
.ovl-title{font-family:'Champ Black',serif;font-weight:900;font-size:24px;color:var(--ink);text-transform:lowercase;line-height:1.05;margin-top:2px;}
.close-btn{width:32px;height:32px;border-radius:50%;background:transparent;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink);flex-shrink:0;}
.close-btn:hover{background:var(--surface);}

/* ── Date Modal ──────────────────────────────────────────── */
.pk-body{padding:14px 18px;display:flex;flex-direction:column;gap:10px;flex-shrink:0;}
.pk-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pk-card{border:1px solid var(--hairline);border-radius:var(--radius-lg, 12px);background:var(--surface);padding:10px 12px;}
.pk-card.tint{background:color-mix(in oklch,var(--amber) 10%,transparent);border-color:color-mix(in oklch,var(--amber) 28%,transparent);}
.pk-card.strong{background:color-mix(in oklch,var(--amber) 16%,transparent);border-color:color-mix(in oklch,var(--amber) 45%,transparent);}
.pk-label{font-family:var(--font-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted-foreground);margin-bottom:5px;}
.pk-val{font-family:'Champ Black',serif;font-weight:900;font-size:16px;color:var(--ink);line-height:1;font-variant-numeric:tabular-nums;}
.pk-time{font-family:var(--font-mono);font-size:10.5px;color:var(--ink);border:1px solid var(--hairline);background:var(--surface-elevated, #fff);padding:3px 7px;border-radius:var(--radius-sm, 8px);font-variant-numeric:tabular-nums;display:inline-block;margin-top:4px;}
.j-step{display:flex;align-items:center;justify-content:space-between;gap:6px;padding-top:2px;}
.j-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--hairline);background:var(--surface-elevated, #fff);color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.j-btn:hover{background:var(--surface);}
.j-num{font-family:'Champ Black',serif;font-weight:900;font-size:26px;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1;}
.j-lbl{font-family:var(--font-mono);font-size:8.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted-foreground);}
.pk-dev{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.tip{display:flex;align-items:flex-start;gap:6px;padding:6px 10px;border-radius:var(--radius-sm, 8px);font-family:var(--font-sans);font-size:10.5px;line-height:1.4;background:color-mix(in oklch,var(--amber) 10%,transparent);border:1px solid color-mix(in oklch,var(--amber) 28%,transparent);color:var(--ink);}
.tip svg{flex-shrink:0;margin-top:1px;}

.cal-wrap{flex:1;overflow-y:auto;border-top:1px solid var(--hairline);padding:10px 18px 6px;}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-mhd{grid-column:1/-1;font-family:'Champ Black',serif;font-weight:900;font-size:14px;color:var(--ink);text-transform:lowercase;text-align:center;padding:6px 0;}
.cal-dow{font-family:var(--font-mono);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-foreground);text-align:center;padding:4px 0;}
.cal-day{font-family:var(--font-mono);font-size:11px;height:30px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums;cursor:pointer;background:transparent;border:0;color:var(--ink);transition:background .1s;}
.cal-day:disabled{color:color-mix(in oklch,var(--muted-foreground) 35%,transparent);text-decoration:line-through;cursor:not-allowed;background:transparent !important;}
.cal-day.range{background:color-mix(in oklch,var(--amber) 22%,transparent);border-radius:0;}
.cal-day.start{background:var(--ink);color:var(--background);font-weight:700;border-radius:4px 0 0 4px;}
.cal-day.end{background:var(--ink);color:var(--background);font-weight:700;border-radius:0 4px 4px 0;}
.cal-day.start.end{border-radius:4px;}
.cal-day:hover:not(:disabled):not(.start):not(.end){background:var(--surface);}

.ovl-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 18px 16px;border-top:1px solid var(--hairline);flex-shrink:0;}
.btn-ghost{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted-foreground);background:transparent;border:0;cursor:pointer;padding:6px;}
.btn-ghost:hover{color:var(--ink);}
.foot-count{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink);display:flex;align-items:center;gap:5px;}
.btn-pill{height:40px;padding:0 24px;border-radius:9999px;background:var(--amber);color:var(--ink);border:0;cursor:pointer;font-family:var(--font-sans);font-weight:600;font-size:13px;}
.btn-pill:hover{filter:brightness(1.05);}
.btn-pill:disabled{opacity:.4;cursor:not-allowed;filter:none;}

/* ── Cart Drawer ─────────────────────────────────────────── */
.dr-date-pill{margin:10px 16px;padding:9px 14px;border:2px solid color-mix(in oklch,var(--amber) 50%,transparent);background:color-mix(in oklch,var(--amber) 10%,transparent);border-radius:9999px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;flex-shrink:0;}
.dr-date-pill svg{color:var(--amber);}
.dr-date-text{font-family:var(--font-sans);font-size:11.5px;font-weight:600;color:var(--ink);flex:1;text-align:center;}
.dr-date-j{font-family:var(--font-mono);font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-foreground);}
.no-dates-bar{background:color-mix(in oklch,#E9552F 10%,transparent);border:1px solid color-mix(in oklch,#E9552F 30%,transparent);border-radius:var(--radius-sm, 8px);margin:0 16px 6px;padding:8px 12px;font-family:var(--font-sans);font-size:11px;color:#E9552F;display:flex;gap:8px;align-items:center;flex-shrink:0;}
.dr-items{flex:1;overflow-y:auto;padding:4px 16px 12px;display:flex;flex-direction:column;gap:8px;}
.dr-item{display:flex;gap:8px;padding:9px;border:1px solid var(--hairline);border-radius:var(--radius-sm, 8px);background:var(--surface);}
.dr-thumb{width:52px;height:44px;border-radius:4px;background:var(--background);border:1px solid var(--hairline);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.dr-info{flex:1;min-width:0;}
.dr-brand{font-family:var(--font-mono);font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-foreground);}
.dr-name{font-family:'Champ Black',serif;font-weight:900;font-size:12px;color:var(--ink);line-height:1.15;text-transform:lowercase;margin-top:1px;}
.dr-foot-row{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
.step-c{display:inline-flex;align-items:center;border:1px solid var(--hairline);border-radius:9999px;background:var(--background);}
.step-btn{width:26px;height:26px;border:0;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink);border-radius:50%;}
.step-btn:hover{background:var(--surface);}
.step-n{font-family:var(--font-mono);font-size:11px;color:var(--ink);width:18px;text-align:center;font-variant-numeric:tabular-nums;}
.dr-price{font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);text-align:right;}
.dr-price .v{color:var(--ink);font-weight:600;font-size:11px;}
.dr-trash{width:26px;height:26px;border-radius:50%;border:0;background:transparent;color:var(--muted-foreground);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;align-self:flex-start;}
.dr-trash:hover{color:#E9552F;}
.dr-totals{border-top:1px solid var(--hairline);padding:12px 16px 16px;flex-shrink:0;}
.tot-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
.tot-lbl{font-family:var(--font-sans);font-size:11px;color:var(--muted-foreground);}
.tot-val{font-family:var(--font-mono);font-size:11px;color:var(--muted-foreground);font-variant-numeric:tabular-nums;}
.tot-green{color:#009971 !important;}
.tot-main{display:flex;justify-content:space-between;align-items:baseline;padding-top:8px;margin-top:4px;margin-bottom:12px;border-top:1px solid var(--hairline);}
.tot-main-lbl{font-family:var(--font-mono);font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted-foreground);}
.tot-main-val{font-family:'Champ Black',serif;font-weight:900;font-size:26px;color:var(--ink);font-variant-numeric:tabular-nums;}
.btn-cta{width:100%;height:46px;border-radius:var(--radius-md, 10px);background:var(--amber);color:var(--ink);border:0;cursor:pointer;font-family:var(--font-sans);font-weight:600;font-size:13px;letter-spacing:.12em;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-cta:hover{filter:brightness(1.05);}
.btn-cta:disabled{opacity:.4;cursor:not-allowed;filter:none;}

/* ── Empty state ─────────────────────────────────────────── */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;padding:40px 24px;}
.empty-icon{font-size:32px;opacity:.35;}
.empty-title{font-family:'Champ Black',serif;font-weight:900;font-size:20px;color:var(--ink);text-transform:lowercase;}
.empty-sub{font-family:var(--font-sans);font-size:13px;color:var(--muted-foreground);}
.empty-cta{margin-top:8px;height:40px;padding:0 22px;border-radius:9999px;background:var(--amber);color:var(--ink);font-family:var(--font-sans);font-weight:600;font-size:13px;border:0;cursor:pointer;}

/* ── Login screen ────────────────────────────────────────── */
.login-avatar{width:56px;height:56px;border-radius:50%;background:var(--surface);border:2px solid var(--hairline);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.login-or{display:flex;align-items:center;gap:10px;margin:12px 0;}
.login-or span{font-family:var(--font-mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted-foreground);white-space:nowrap;}
.login-or::before,.login-or::after{content:'';flex:1;height:1px;background:var(--hairline);}
.btn-secondary{width:100%;height:44px;border-radius:var(--radius-md, 10px);background:transparent;border:1px solid var(--hairline);color:var(--ink);font-family:var(--font-sans);font-weight:600;font-size:13px;cursor:pointer;transition:border-color .15s;}
.btn-secondary:hover{border-color:var(--ink);}

/* ── Portal screen ───────────────────────────────────────── */
.portal-topbar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--hairline);flex-shrink:0;}
.estado-pill-azul{background:color-mix(in oklch,#1097DB 12%,transparent);color:#1097DB;border:1px solid color-mix(in oklch,#1097DB 30%,transparent);border-radius:9999px;font-family:var(--font-mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:3px 10px;font-weight:600;}
.timeline{display:flex;align-items:center;gap:0;padding:0 2px;}
.tl-node{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;}
.tl-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tl-lbl{font-family:var(--font-mono);font-size:7.5px;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;}
.tl-line{flex:1;height:2px;margin:0 2px;margin-bottom:18px;}

/* ── Checkout ────────────────────────────────────────────── */
.back-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--hairline);background:transparent;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.back-btn:hover{background:var(--surface);}
.flow-steps{display:flex;align-items:center;gap:5px;padding:10px 18px 0;}
.step-dot{width:6px;height:6px;border-radius:50%;background:var(--hairline);transition:all .2s;}
.step-dot.done{background:var(--ink);}
.step-dot.active{width:18px;border-radius:3px;background:var(--amber);}
.form-section{padding:14px 18px;border-bottom:1px solid var(--hairline);}
.form-sec-lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted-foreground);margin-bottom:12px;}
.form-group{display:flex;flex-direction:column;gap:10px;}
.form-field{display:flex;flex-direction:column;gap:5px;}
.form-lbl{font-family:var(--font-sans);font-size:12px;font-weight:600;color:var(--foreground);}
.form-input{width:100%;height:44px;border:1px solid var(--hairline);border-radius:var(--radius-md, 10px);background:var(--surface-elevated, #fff);padding:0 12px;font-family:var(--font-sans);font-size:16px;color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s;}
.form-input:focus{border-color:color-mix(in oklch,var(--amber) 60%,transparent);box-shadow:0 0 0 3px color-mix(in oklch,var(--amber) 14%,transparent);}
textarea.form-input{height:72px;padding:10px 12px;resize:none;line-height:1.5;}
.sum-section{padding:12px 18px;border-bottom:1px solid var(--hairline);display:flex;flex-direction:column;gap:8px;}
.sum-item{display:flex;align-items:center;gap:8px;}
.sum-thumb{width:32px;height:28px;border-radius:4px;background:var(--surface);border:1px solid var(--hairline);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.sum-info{flex:1;}
.sum-name{font-family:'Champ Black',serif;font-weight:900;font-size:11px;color:var(--ink);text-transform:lowercase;}

.btn-back-cat:hover{border-color:var(--ink);}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

/* ── Data ─────────────────────────────────────────────────── */
const ITEMS = [
  { id:'e1', cat:'Cámaras',      brand:'Sony',    name:'fx3 montura e full-frame',   icon:'📷', price:38000, isNew:true  },
  { id:'e2', cat:'Cámaras',      brand:'Sony',    name:'a7s iii montura e full-frame',icon:'📷', price:28000, isNew:false },
  { id:'i2', cat:'Iluminación',  brand:'Aputure', name:'300d mark ii daylight',       icon:'💡', price:9500,  isNew:false },
  { id:'a1', cat:'Audio',        brand:'RØDE',    name:'ntg5 shotgun',                icon:'🎙', price:6000,  isNew:false },
];

/* June 2026: Jun 1 = Sunday (Mon-first offset = 6) */
const BLOCKED = [1, 8, 15, 22, 28, 29];
const DOW = ['lun','mar','mié','jue','vie','sáb','dom'];

/* ── Utils ────────────────────────────────────────────────── */
function fmtARS(n) {
  return '$ ' + Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.');
}
function dowOf(d) { return DOW[(d + 5) % 7]; }
function fmtDay(d) { return `${dowOf(d)} ${d}`; }

function calcTotals(cartItems, jornadas) {
  const subtotal = cartItems.reduce((s,i)=> s + i.price * jornadas * i.qty, 0);
  const discountRate = jornadas >= 3 ? 0.05 : 0;
  const discount = Math.round(subtotal * discountRate);
  const net = subtotal - discount;
  const iva = Math.round(net * 0.21);
  return { subtotal, discount, net, iva, total: net + iva };
}

/* ── Icons ────────────────────────────────────────────────── */
const IcoCalendar = ({s=16}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>;
const IcoBag     = ({s=16}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>;
const IcoX       = ({s=16}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>;
const IcoPlus    = ({s=12}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>;
const IcoMinus   = ({s=12}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M5 12h14"/></svg>;
const IcoTrash   = ({s=13}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
const IcoCheck   = ({s=24}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
const IcoLeft    = ({s=16}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
const IcoRight   = ({s=14}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
const IcoClock   = ({s=11}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
const IcoAlert   = ({s=13}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;

/* ── Date Modal ───────────────────────────────────────────── */
function DateModal({ onClose, onApply, initDay, initJornadas }) {
  const [pickerDay, setPickerDay]   = useState(initDay || null);
  const [jornadas, setJornadas]     = useState(initJornadas || 3);

  const endDay = pickerDay ? Math.min(pickerDay + jornadas, 30) : null;
  const isBlocked = d => BLOCKED.includes(d);

  /* Build June 2026 grid (offset 6 = day 1 is Sunday) */
  const cells = [];
  for (let i = 0; i < 6; i++) cells.push(null);
  for (let d = 1; d <= 30; d++) cells.push(d);

  function dayClass(d) {
    const cls = ['cal-day'];
    if (d === pickerDay && d === endDay) cls.push('start end');
    else if (d === pickerDay) cls.push('start');
    else if (d === endDay)   cls.push('end');
    else if (pickerDay && d > pickerDay && d < endDay) cls.push('range');
    return cls.join(' ');
  }

  return (
    <div className="overlay from-bottom">
      <div className="ovl-head">
        <div>
          <div className="ovl-eye">Fechas del alquiler</div>
          <div className="ovl-title">elegí tus fechas.</div>
        </div>
        <button className="close-btn" onClick={onClose}><IcoX /></button>
      </div>

      <div className="pk-body">
        <div className="pk-row">
          {/* Retiro */}
          <div className="pk-card">
            <div className="pk-label">Retiro</div>
            <div className="pk-val">{pickerDay ? `${fmtDay(pickerDay)} jun` : '—'}</div>
            <div className="pk-time">18:00</div>
          </div>
          {/* Jornadas stepper */}
          <div className="pk-card tint">
            <div className="pk-label">Jornadas</div>
            <div className="j-step">
              <button className="j-btn" onClick={() => setJornadas(j => Math.max(1, j-1))}><IcoMinus s={12}/></button>
              <div style={{textAlign:'center'}}>
                <div className="j-num">{jornadas}</div>
                <div className="j-lbl">jornadas</div>
              </div>
              <button className="j-btn" onClick={() => setJornadas(j => Math.min(14, j+1))}><IcoPlus s={12}/></button>
            </div>
          </div>
        </div>

        {/* Devolución */}
        <div className="pk-card strong pk-dev">
          <div>
            <div className="pk-label">Devolución</div>
            <div className="pk-val">{endDay ? `${fmtDay(endDay)} jun` : '—'}</div>
          </div>
          {endDay && <div className="pk-time">18:00</div>}
        </div>

        <div className="tip">
          <IcoClock s={11}/>
          <span>Horarios cada 30 min, sujeto a confirmación. Devolver después de la hora de retiro suma una jornada.</span>
        </div>
      </div>

      {/* Calendar */}
      <div className="cal-wrap">
        <div className="cal">
          <div className="cal-mhd">junio 2026</div>
          {['L','M','M','J','V','S','D'].map((d,i) => <div key={i} className="cal-dow">{d}</div>)}
          {cells.map((d, i) => {
            if (!d) return <div key={`e${i}`}/>;
            return (
              <button
                key={d}
                className={dayClass(d)}
                disabled={isBlocked(d)}
                onClick={() => setPickerDay(d)}
              >{d}</button>
            );
          })}
        </div>
      </div>

      <div className="ovl-foot">
        <button className="btn-ghost" onClick={() => setPickerDay(null)}>Limpiar</button>
        <span className="foot-count">
          <IcoCalendar s={11}/>
          {pickerDay ? `${jornadas} jornada${jornadas !== 1 ? 's' : ''}` : 'Elegí un día'}
        </span>
        <button
          className="btn-pill"
          disabled={!pickerDay}
          onClick={() => pickerDay && onApply({ day: pickerDay, jornadas, endDay })}
        >Aplicar</button>
      </div>
    </div>
  );
}

/* ── Cart Drawer ──────────────────────────────────────────── */
function CartDrawer({ cart, dates, onClose, onSetDates, onUpdateQty, onConfirm }) {
  const cartItems = ITEMS
    .filter(i => (cart[i.id] || 0) > 0)
    .map(i => ({ ...i, qty: cart[i.id] }));
  const hasItems = cartItems.length > 0;
  const j = dates?.jornadas || 1;
  const { subtotal, discount, iva, total } = calcTotals(cartItems, j);

  const dateLabel = dates
    ? `${fmtDay(dates.day)} → ${fmtDay(dates.endDay)} jun · 18:00`
    : 'Elegir fechas';

  return (
    <div className="overlay from-bottom">
      <div className="ovl-head">
        <div>
          <div className="ovl-eye">Tu pedido</div>
          <div className="ovl-title">cotización.</div>
        </div>
        <button className="close-btn" onClick={onClose}><IcoX /></button>
      </div>

      {/* Date pill */}
      <button className="dr-date-pill" onClick={onSetDates}>
        <IcoCalendar s={13}/>
        <span className="dr-date-text">{dateLabel}</span>
        {dates && <span className="dr-date-j">· {dates.jornadas} J</span>}
      </button>

      {!dates && hasItems && (
        <div className="no-dates-bar">
          <IcoAlert s={13}/>
          <span>Elegí las fechas para ver el total.</span>
        </div>
      )}

      {hasItems ? (
        <div className="dr-items">
          {cartItems.map(item => (
            <div key={item.id} className="dr-item">
              <div className="dr-thumb">{item.icon}</div>
              <div className="dr-info">
                <div className="dr-brand">{item.brand}</div>
                <div className="dr-name">{item.name}</div>
                <div className="dr-foot-row">
                  <div className="step-c">
                    <button className="step-btn" onClick={() => onUpdateQty(item.id, item.qty - 1)}><IcoMinus s={10}/></button>
                    <span className="step-n">{item.qty}</span>
                    <button className="step-btn" onClick={() => onUpdateQty(item.id, item.qty + 1)}><IcoPlus s={10}/></button>
                  </div>
                  <div className="dr-price">
                    <span className="v">{fmtARS(item.price * j * item.qty)}</span>
                    <br/>· {j} J
                  </div>
                </div>
              </div>
              <button className="dr-trash" onClick={() => onUpdateQty(item.id, 0)}><IcoTrash/></button>
            </div>
          ))}
        </div>
      ) : (
        <div className="empty">
          <div className="empty-icon">🛒</div>
          <div className="empty-title">carrito vacío.</div>
          <div className="empty-sub">Agregá equipos desde el catálogo.</div>
          <button className="empty-cta" onClick={onClose}>Explorar catálogo</button>
        </div>
      )}

      {hasItems && (
        <div className="dr-totals">
          {dates && (
            <>
              <div className="tot-row">
                <span className="tot-lbl">Subtotal · {j} jornadas</span>
                <span className="tot-val">{fmtARS(subtotal)}</span>
              </div>
              {discount > 0 && (
                <div className="tot-row">
                  <span className="tot-lbl tot-green">Desc. 5% (3+ jornadas)</span>
                  <span className="tot-val tot-green">−{fmtARS(discount)}</span>
                </div>
              )}
              <div className="tot-row">
                <span className="tot-lbl">IVA 21%</span>
                <span className="tot-val">+{fmtARS(iva)}</span>
              </div>
            </>
          )}
          <div className="tot-main">
            <span className="tot-main-lbl">Total{dates ? ' · IVA inc.' : ''}</span>
            <span className="tot-main-val">{dates ? fmtARS(total) : '—'}</span>
          </div>
          <button
            className="btn-cta"
            disabled={!dates}
            onClick={dates ? onConfirm : undefined}
          >
            {dates ? 'Confirmar solicitud' : 'Elegí las fechas primero'}
            {dates && <IcoRight s={14}/>}
          </button>
        </div>
      )}
    </div>
  );
}

/* ── Catalog Screen ───────────────────────────────────────── */
function CatalogScreen({ cart, dates, onAdd, onRemove, onOpenDates, onOpenCart }) {
  const cartItems = ITEMS.filter(i => (cart[i.id] || 0) > 0).map(i => ({...i, qty: cart[i.id]}));
  const cartCount = cartItems.reduce((a, i) => a + i.qty, 0);
  const j = dates?.jornadas || 1;
  const { total } = calcTotals(cartItems, j);

  const datePillLabel = dates
    ? `${fmtDay(dates.day)} → ${fmtDay(dates.endDay)} jun`
    : 'Elegir fechas';

  return (
    <div className="screen">
      {/* TopBar */}
      <div className="topbar">
        <img src="assets/rambla-wordmark.webp" alt="Rambla" className="logo"/>
        <button className="date-pill" onClick={onOpenDates}>
          <span className="ical"><IcoCalendar s={14}/></span>
          <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis'}}>{datePillLabel}</span>
          {dates && <span className="meta">· {dates.jornadas} J</span>}
        </button>
        <button className="cart-btn" onClick={onOpenCart}>
          <IcoBag s={15}/>
          <span className="n">{cartCount}</span>
        </button>
      </div>

      {/* Hero */}
      <div className="cat-hero">
        <div className="cat-hero-eye">Catálogo · Mar del Plata</div>
        <div className="cat-hero-title">equipos para<br/>tu rodaje.</div>
      </div>

      {/* Grid */}
      <div className="section-hd">
        <div>
          <div className="section-eye">Destacados</div>
          <div className="section-wm">catálogo</div>
        </div>
        <div className="section-cnt">{ITEMS.length} equipos</div>
      </div>

      <div className="equip-grid">
        {ITEMS.map(item => {
          const qty = cart[item.id] || 0;
          return (
            <div key={item.id} className="equip-card">
              <div className="equip-thumb">
                {item.isNew && (
                  <span style={{position:'absolute',top:7,left:7,background:'var(--ink)',color:'var(--background)',fontFamily:'var(--font-mono)',fontSize:'7.5px',letterSpacing:'.15em',textTransform:'uppercase',padding:'2px 6px',borderRadius:'9999px',zIndex:1}}>nuevo</span>
                )}
                {item.icon}
              </div>
              <div className="equip-info">
                <div className="equip-cat">{item.cat}</div>
                <div className="equip-name">{item.brand} {item.name}</div>
                <div className="equip-price-row">
                  <span className="ep-val">{fmtARS(item.price)}</span>
                  <span className="ep-per">/día</span>
                </div>
              </div>
              <div className="equip-foot">
                {qty === 0
                  ? <button className="btn-add" onClick={() => onAdd(item.id)}><IcoPlus s={12}/> Agregar</button>
                  : <div className="qty-ctrl">
                      <button className="qty-btn" onClick={() => onRemove(item.id)}><IcoMinus s={12}/></button>
                      <span className="qty-n">{qty}</span>
                      <button className="qty-btn" onClick={() => onAdd(item.id)}><IcoPlus s={12}/></button>
                    </div>
                }
              </div>
            </div>
          );
        })}
      </div>

      <div style={{height: cartCount > 0 ? 0 : 24, flexShrink:0}}/>

      {/* Cart minibar */}
      {cartCount > 0 && (
        <div className="minibar" onClick={onOpenCart}>
          <div className="minibar-left">
            <div className="minibar-eye">{cartCount} ítem{cartCount !== 1 ? 's' : ''}</div>
            <div className="minibar-total">{dates ? fmtARS(total) : `${cartCount} ítem${cartCount !== 1 ? 's' : ''}`}</div>
          </div>
          <button className="minibar-cta" onClick={e => { e.stopPropagation(); onOpenCart(); }}>
            Ver pedido <IcoRight s={13}/>
          </button>
        </div>
      )}
    </div>
  );
}

/* ── Login Screen ─────────────────────────────────────────── */
const MOCK_USER = { name:'Martín García', email:'martin@producciones.com', phone:'+54 223 456 7890' };

function LoginScreen({ onBack, onLogin }) {
  const [email, setEmail] = useState('');
  const [pass,  setPass]  = useState('');
  const canLogin = email.trim().length > 3 && pass.length >= 4;

  return (
    <div className="screen from-right" style={{zIndex:50}}>
      <div className="ovl-head">
        <button className="back-btn" onClick={onBack}><IcoLeft s={16}/></button>
        <div style={{flex:1}}>
          <div className="ovl-eye">Confirmar pedido</div>
          <div className="ovl-title">ingresá.</div>
        </div>
      </div>

      <div className="flow-steps">
        <div className="step-dot done"></div>
        <div className="step-dot active"></div>
        <div className="step-dot"></div>
      </div>

      <div style={{padding:'20px 18px 16px',borderBottom:'1px solid var(--hairline)',textAlign:'center'}}>
        <div className="login-avatar">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </div>
        <p style={{fontFamily:'var(--font-sans)',fontSize:'13px',lineHeight:'1.55',color:'var(--muted-foreground)',maxWidth:260,margin:'0 auto'}}>
          Ingresá con tu cuenta Rambla para completar la solicitud — traemos tus datos automáticamente.
        </p>
      </div>

      <div className="form-section">
        <div className="form-sec-lbl">Tu cuenta Rambla</div>
        <div className="form-group">
          <div className="form-field">
            <label className="form-lbl">Correo electrónico</label>
            <input className="form-input" type="email" placeholder="tu@correo.com"
              value={email} onChange={e => setEmail(e.target.value)}/>
          </div>
          <div className="form-field">
            <label className="form-lbl">Contraseña</label>
            <input className="form-input" type="password" placeholder="••••••••"
              value={pass} onChange={e => setPass(e.target.value)}/>
          </div>
        </div>
        <a style={{display:'block',marginTop:10,fontFamily:'var(--font-mono)',fontSize:'9px',letterSpacing:'.18em',textTransform:'uppercase',color:'var(--muted-foreground)',cursor:'pointer',textDecoration:'none'}}>
          Olvidé mi contraseña
        </a>
      </div>

      <div style={{padding:'4px 18px 8px',display:'flex',flexDirection:'column',gap:10}}>
        <button className="btn-submit" disabled={!canLogin}
          onClick={canLogin ? () => onLogin(email) : undefined}>
          <IcoRight s={16}/> Ingresar y continuar
        </button>
        <div className="login-or"><span>o</span></div>
        <button className="btn-secondary" onClick={() => onLogin(email, true)}>
          Crear cuenta nueva
        </button>
        {!canLogin && (
          <p style={{fontFamily:'var(--font-mono)',fontSize:'9px',letterSpacing:'.12em',textTransform:'uppercase',color:'var(--muted-foreground)',textAlign:'center'}}>
            Ingresá tu correo y contraseña
          </p>
        )}
      </div>
    </div>
  );
}

/* ── Portal Screen ────────────────────────────────────────── */
function PortalScreen({ cart, dates, form, onBack }) {
  const cartItems = ITEMS.filter(i => (cart[i.id]||0)>0).map(i=>({...i,qty:cart[i.id]}));
  const j = dates?.jornadas || 1;
  const { total } = calcTotals(cartItems, j);

  const ESTADOS = [
    { key:'presupuesto', label:'Presupuesto', active:true  },
    { key:'confirmado',  label:'Confirmado',  active:false },
    { key:'retirado',    label:'Retirado',    active:false },
    { key:'devuelto',    label:'Devuelto',    active:false },
  ];

  return (
    <div className="screen from-right" style={{zIndex:50}}>
      {/* TopBar portal */}
      <div className="portal-topbar">
        <button style={{background:'transparent',border:0,cursor:'pointer',color:'var(--ink)',display:'flex',alignItems:'center',padding:4}} onClick={onBack}><IcoLeft s={18}/></button>
        <img src="assets/rambla-wordmark.webp" alt="Rambla" className="logo"/>
        <div style={{flex:1}}/>
        <span style={{fontFamily:'var(--font-mono)',fontSize:'9px',letterSpacing:'.15em',textTransform:'uppercase',color:'var(--muted-foreground)'}}>Mi cuenta</span>
      </div>

      {/* Pedido header */}
      <div style={{padding:'16px 18px',background:'var(--surface)',borderBottom:'1px solid var(--hairline)',flexShrink:0}}>
        <div style={{fontFamily:'var(--font-mono)',fontSize:'9px',letterSpacing:'.2em',textTransform:'uppercase',color:'var(--muted-foreground)',marginBottom:4}}>Pedido</div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontFamily:"'Champ Black',serif",fontWeight:900,fontSize:'22px',color:'var(--ink)',textTransform:'lowercase'}}>RMB-2026-0312</div>
          <span className="estado-pill-azul">Presupuesto</span>
        </div>
      </div>

      {/* Timeline */}
      <div style={{padding:'16px 18px',borderBottom:'1px solid var(--hairline)',flexShrink:0}}>
        <div style={{fontFamily:'var(--font-mono)',fontSize:'9px',letterSpacing:'.2em',textTransform:'uppercase',color:'var(--muted-foreground)',marginBottom:14}}>Estado del pedido</div>
        <div className="timeline">
          {ESTADOS.map((e, idx) => (
            <React.Fragment key={e.key}>
              <div className="tl-node">
                <div className="tl-dot" style={{background: e.active ? 'var(--amber)' : 'var(--hairline)'}}>
                  {e.active && <IcoCheck s={11}/>}
                </div>
                <div className="tl-lbl" style={{color: e.active ? 'var(--ink)' : 'var(--muted-foreground)', fontWeight: e.active ? 600 : 400}}>{e.label}</div>
              </div>
              {idx < ESTADOS.length-1 && (
                <div className="tl-line" style={{background:'var(--hairline)'}}/>
              )}
            </React.Fragment>
          ))}
        </div>
      </div>

      {/* Dates */}
      {dates && (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',padding:'12px 18px',gap:12,borderBottom:'1px solid var(--hairline)',flexShrink:0}}>
          <div>
            <div style={{fontFamily:'var(--font-mono)',fontSize:'9px',letterSpacing:'.18em',textTransform:'uppercase',color:'var(--muted-foreground)',marginBottom:3}}>Retiro</div>
            <div style={{fontFamily:'var(--font-sans)',fontSize:'13px',fontWeight:600,color:'var(--ink)'}}>{fmtDay(dates.day)} jun</div>
            <div style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--muted-foreground)'}}>18:00</div>
          </div>
          <div>
            <div style={{fontFamily:'var(--font-mono)',fontSize:'9px',letterSpacing:'.18em',textTransform:'uppercase',color:'var(--muted-foreground)',marginBottom:3}}>Devolución</div>
            <div style={{fontFamily:'var(--font-sans)',fontSize:'13px',fontWeight:600,color:'var(--ink)'}}>{fmtDay(dates.endDay)} jun</div>
            <div style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--muted-foreground)'}}>18:00</div>
          </div>
        </div>
      )}

      {/* Items */}
      <div style={{padding:'12px 18px',borderBottom:'1px solid var(--hairline)',flex:1,overflowY:'auto'}}>
        <div style={{fontFamily:'var(--font-mono)',fontSize:'9px',letterSpacing:'.2em',textTransform:'uppercase',color:'var(--muted-foreground)',marginBottom:10}}>Equipos</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {cartItems.map(item => (
            <div key={item.id} style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:36,height:32,borderRadius:4,background:'var(--surface)',border:'1px solid var(--hairline)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'16px',flexShrink:0}}>{item.icon}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'Champ Black',serif",fontWeight:900,fontSize:'12px',color:'var(--ink)',textTransform:'lowercase',lineHeight:1.15}}>{item.brand} {item.name}</div>
                <div style={{fontFamily:'var(--font-mono)',fontSize:'9px',color:'var(--muted-foreground)'}}>{item.qty} × {j} J</div>
              </div>
              <div style={{fontFamily:'var(--font-mono)',fontSize:'11px',color:'var(--ink)',fontVariantNumeric:'tabular-nums',flexShrink:0}}>{fmtARS(item.price*j*item.qty)}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Total + contact */}
      <div style={{padding:'10px 18px',borderBottom:'1px solid var(--hairline)',display:'flex',justifyContent:'space-between',alignItems:'baseline',flexShrink:0}}>
        <span style={{fontFamily:'var(--font-mono)',fontSize:'9px',letterSpacing:'.2em',textTransform:'uppercase',color:'var(--muted-foreground)'}}>Total estimado · IVA inc.</span>
        <span style={{fontFamily:"'Champ Black',serif",fontWeight:900,fontSize:'22px',color:'var(--ink)',fontVariantNumeric:'tabular-nums'}}>{fmtARS(total)}</span>
      </div>
      {form?.email && (
        <div style={{padding:'10px 18px',borderBottom:'1px solid var(--hairline)',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
          <span style={{fontFamily:'var(--font-mono)',fontSize:'9px',letterSpacing:'.15em',textTransform:'uppercase',color:'var(--muted-foreground)'}}>Contacto</span>
          <span style={{fontFamily:'var(--font-sans)',fontSize:'12px',color:'var(--ink)',fontWeight:500}}>{form.name || form.email}</span>
        </div>
      )}

      <div style={{padding:'14px 18px 20px',flexShrink:0}}>
        <p style={{fontFamily:'var(--font-sans)',fontSize:'12px',lineHeight:'1.55',color:'var(--muted-foreground)',marginBottom:12,textAlign:'center'}}>
          Confirmamos disponibilidad en menos de 2 horas y te avisamos por email.
        </p>
        <button className="btn-back-cat" style={{width:'100%'}} onClick={onBack}>Volver al catálogo</button>
      </div>
    </div>
  );
}

/* ── Checkout Screen ──────────────────────────────────────── */
function CheckoutScreen({ cart, dates, form, onFormChange, onBack, onSubmit }) {
  const cartItems = ITEMS.filter(i => (cart[i.id]||0)>0).map(i=>({...i,qty:cart[i.id]}));
  const j = dates?.jornadas || 1;
  const { total } = calcTotals(cartItems, j);
  const canSubmit = form.name.trim() && form.email.trim() && form.phone.trim();

  return (
    <div className="screen from-right" style={{zIndex:50}}>
      {/* Header */}
      <div className="ovl-head">
        <button className="back-btn" onClick={onBack}><IcoLeft s={16}/></button>
        <div style={{flex:1}}>
          <div className="ovl-eye">Paso 2 de 2</div>
          <div className="ovl-title">tus datos.</div>
        </div>
      </div>

      {/* Steps indicator */}
      <div className="flow-steps">
        <div className="step-dot done"></div>
        <div className="step-dot active"></div>
        <div className="step-dot"></div>
      </div>

      {/* Cart summary */}
      <div className="sum-section" style={{marginTop:14}}>
        <div className="form-sec-lbl">Resumen del pedido</div>
        {cartItems.map(item => (
          <div key={item.id} className="sum-item">
            <div className="sum-thumb">{item.icon}</div>
            <div className="sum-info">
              <div className="sum-name">{item.brand} {item.name}</div>
              <div className="sum-qty">{item.qty} × {j} J</div>
            </div>
            <div className="sum-price">{fmtARS(item.price * j * item.qty)}</div>
          </div>
        ))}
      </div>

      {/* Dates summary */}
      {dates && (
        <div style={{padding:'10px 18px',borderBottom:'1px solid var(--hairline)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontFamily:'var(--font-mono)',fontSize:'9px',letterSpacing:'.18em',textTransform:'uppercase',color:'var(--muted-foreground)'}}>Fechas</span>
          <span style={{fontFamily:'var(--font-sans)',fontSize:'12px',fontWeight:600,color:'var(--ink)'}}>
            {fmtDay(dates.day)} → {fmtDay(dates.endDay)} jun · 18:00
          </span>
        </div>
      )}

      <div className="sum-total-row">
        <span className="sum-total-lbl">Total · IVA inc.</span>
        <span className="sum-total-val">{fmtARS(total)}</span>
      </div>

      {/* Form */}
      <div className="form-section">
        <div className="form-sec-lbl">Datos de contacto</div>
        <div className="form-group">
          <div className="form-field">
            <label className="form-lbl">Nombre completo</label>
            <input className="form-input" type="text" placeholder="Tu nombre"
              value={form.name} onChange={e => onFormChange('name', e.target.value)}/>
          </div>
          <div className="form-field">
            <label className="form-lbl">Correo electrónico</label>
            <input className="form-input" type="email" placeholder="tu@correo.com"
              value={form.email} onChange={e => onFormChange('email', e.target.value)}/>
          </div>
          <div className="form-field">
            <label className="form-lbl">Celular</label>
            <input className="form-input" type="tel" placeholder="+54 223 …"
              value={form.phone} onChange={e => onFormChange('phone', e.target.value)}/>
          </div>
          <div className="form-field">
            <label className="form-lbl">Nota <span style={{fontWeight:400,color:'var(--muted-foreground)'}}>/ Opcional</span></label>
            <textarea className="form-input" placeholder="¿Algo que tengamos que saber del proyecto?"
              value={form.note} onChange={e => onFormChange('note', e.target.value)}/>
          </div>
        </div>
      </div>

      <div className="submit-wrap">
        <button className="btn-submit" disabled={!canSubmit} onClick={canSubmit ? onSubmit : undefined}>
          <IcoCheck s={16}/> Enviar solicitud
        </button>
        {!canSubmit && (
          <p style={{fontFamily:'var(--font-mono)',fontSize:'9px',letterSpacing:'.15em',textTransform:'uppercase',color:'var(--muted-foreground)',textAlign:'center',marginTop:8}}>
            Completá los campos obligatorios
          </p>
        )}
      </div>
    </div>
  );
}

/* ── Confirm Screen ───────────────────────────────────────── */
function ConfirmScreen({ cart, dates, form, onReset, onGoPortal }) {
  const cartItems = ITEMS.filter(i => (cart[i.id]||0)>0).map(i=>({...i,qty:cart[i.id]}));
  const j = dates?.jornadas || 1;
  const { total } = calcTotals(cartItems, j);
  const itemCount = cartItems.reduce((a,i)=>a+i.qty,0);

  return (
    <div className="screen from-right" style={{zIndex:50}}>
      {/* Steps */}
      <div className="flow-steps" style={{padding:'14px 18px 0'}}>
        <div className="step-dot done"></div>
        <div className="step-dot done"></div>
        <div className="step-dot active"></div>
      </div>

      <div className="confirm-body">
        <div className="confirm-check">
          <IcoCheck s={28}/>
        </div>
        <div className="confirm-title">pedido<br/>recibido.</div>
        <div className="confirm-sub">
          Te confirmamos la disponibilidad en menos de 2 horas y te avisamos por email.
        </div>
        <div className="confirm-num">RMB-2026-0312</div>

        <div className="confirm-detail">
          {dates && (
            <div className="cd-row">
              <span className="cd-k">Retiro</span>
              <span className="cd-v">{fmtDay(dates.day)} jun · 18:00</span>
            </div>
          )}
          {dates && (
            <div className="cd-row">
              <span className="cd-k">Devolución</span>
              <span className="cd-v">{fmtDay(dates.endDay)} jun · 18:00</span>
            </div>
          )}
          <div className="cd-row">
            <span className="cd-k">Equipos</span>
            <span className="cd-v">{itemCount} ítem{itemCount !== 1 ? 's' : ''}</span>
          </div>
          <div className="cd-row">
            <span className="cd-k">Total estimado</span>
            <span className="cd-v" style={{fontWeight:700}}>{fmtARS(total)}</span>
          </div>
          {form?.email && (
            <div className="cd-row">
              <span className="cd-k">Confirmación a</span>
              <span className="cd-v" style={{fontSize:'12px'}}>{form.email}</span>
            </div>
          )}
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:10,width:'100%'}}>
          <button className="btn-submit" style={{height:44,fontSize:13}} onClick={onGoPortal}>
            <IcoRight s={15}/> Ver mi pedido
          </button>
          <button className="btn-back-cat" style={{width:'100%'}} onClick={onReset}>Volver al catálogo</button>
        </div>
      </div>
    </div>
  );
}

/* ── App root ─────────────────────────────────────────────── */
function App() {
  const [view,       setView]       = useState('catalog'); // 'catalog'|'login'|'checkout'|'confirm'|'portal'
  const [modal,      setModal]      = useState(null);       // null|'dates'|'cart'
  const [dateOrigin, setDateOrigin] = useState(null);       // null|'cart'
  const [dates,      setDates]      = useState(null);
  const [cart,       setCart]       = useState({});
  const [form,       setForm]       = useState({ name:'', email:'', phone:'', note:'' });

  const addItem    = id => setCart(c => ({...c, [id]: (c[id]||0)+1}));
  const removeItem = id => setCart(c => {
    const n = {...c};
    if ((n[id]||0) <= 1) delete n[id]; else n[id]--;
    return n;
  });
  const updateQty  = (id, qty) => {
    if (qty <= 0) setCart(c => { const n={...c}; delete n[id]; return n; });
    else setCart(c => ({...c, [id]: qty}));
  };

  /* After applying dates: if opened from cart, reopen cart */
  const applyDates = d => {
    setDates(d);
    setModal(dateOrigin === 'cart' ? 'cart' : null);
    setDateOrigin(null);
  };

  const confirmCart      = () => { setModal(null); setView('login'); };
  const handleLogin      = (email, isNew) => {
    /* Pre-fill with mock user data (simulate fetching account) */
    setForm({
      name:  MOCK_USER.name,
      email: email.trim() || MOCK_USER.email,
      phone: MOCK_USER.phone,
      note:  '',
    });
    setView('checkout');
  };
  const submitCheckout   = () => setView('confirm');
  const reset            = () => {
    setView('catalog'); setModal(null); setCart({});
    setDates(null); setForm({ name:'', email:'', phone:'', note:'' });
  };

  return (
    <div className="phone">
      {/* Status bar */}
      <div className="status">
        <div className="status-pill"/>
        <span style={{fontWeight:600}}>9:41</span>
        <div style={{width:80}}/>
        <div style={{display:'flex',gap:5,alignItems:'center'}}>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor">
            <rect x="0"   y="7"   width="3"   height="5"    rx="1" opacity="1"/>
            <rect x="4.5" y="4.5" width="3"   height="7.5"  rx="1" opacity="1"/>
            <rect x="9"   y="2"   width="3"   height="10"   rx="1" opacity="1"/>
            <rect x="13.5" y="0"  width="2.5" height="12"   rx="1" opacity=".3"/>
          </svg>
          <svg width="16" height="12" viewBox="0 0 24 18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
            <path d="M1 1a22 22 0 0 1 22 0"/><path d="M5 7a14 14 0 0 1 14 0"/><path d="M9 13a6 6 0 0 1 6 0"/>
            <circle cx="12" cy="17" r="1.2" fill="currentColor"/>
          </svg>
          <span style={{fontSize:'11px',fontWeight:600}}>100%</span>
        </div>
      </div>

      {/* Viewport */}
      <div className="viewport">
        {/* Main screens */}
        {view === 'catalog' && (
          <CatalogScreen
            cart={cart} dates={dates}
            onAdd={addItem} onRemove={removeItem}
            onOpenDates={() => setModal('dates')}
            onOpenCart={() => setModal('cart')}
          />
        )}
        {view === 'login' && (
          <LoginScreen
            onBack={() => { setView('catalog'); setModal('cart'); }}
            onLogin={handleLogin}
          />
        )}
        {view === 'checkout' && (
          <CheckoutScreen
            cart={cart} dates={dates} form={form}
            onFormChange={(k,v) => setForm(f=>({...f,[k]:v}))}
            onBack={() => setView('login')}
            onSubmit={submitCheckout}
          />
        )}
        {view === 'confirm' && (
          <ConfirmScreen
            cart={cart} dates={dates} form={form}
            onReset={reset}
            onGoPortal={() => setView('portal')}
          />
        )}
        {view === 'portal' && (
          <PortalScreen
            cart={cart} dates={dates} form={form}
            onBack={reset}
          />
        )}

        {/* Overlays */}
        {modal === 'dates' && (
          <DateModal
            onClose={() => { setModal(dateOrigin === 'cart' ? 'cart' : null); setDateOrigin(null); }}
            onApply={applyDates}
            initDay={dates?.day || null}
            initJornadas={dates?.jornadas || 3}
          />
        )}
        {modal === 'cart' && (
          <CartDrawer
            cart={cart} dates={dates}
            onClose={() => setModal(null)}
            onSetDates={() => { setDateOrigin('cart'); setModal('dates'); }}
            onUpdateQty={updateQty}
            onConfirm={confirmCart}
          />
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
