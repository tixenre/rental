<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--background); font-family: var(--font-sans); padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }
  .section-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted-foreground); }
  .rule { font-family: var(--font-mono); font-size: 9px; color: var(--muted-foreground); letter-spacing: 0.08em; }
  .amber-bar { height: 4px; background: #FAB428; border-radius: 2px; width: 32px; }
</style>
</head>
<body>
  <div class="section-label">Display — Champ Black · taglines · showpieces only</div>
  <div style="height:4px;"></div>
  <div style="display:flex;flex-direction:column;gap:10px;">
    <div class="t-display-1" style="color:var(--ink-pure);font-size:clamp(1.5rem,5vw,3rem);">rental, estudio, rambla.</div>
    <div class="amber-bar"></div>
    <div class="t-display-1" style="color:var(--ink);font-size:clamp(1.5rem,5vw,3rem);">con rambla, en mardel.</div>
    <div class="amber-bar"></div>
    <div class="t-display-1" style="color:var(--ink-pure);font-size:clamp(1.5rem,5vw,3rem);">en rambla, tu proyecto.</div>
    <div class="amber-bar"></div>
    <div class="t-display-1" style="color:var(--ink);font-size:clamp(1.5rem,5vw,3rem);">con rambla, tu rodaje.</div>
  </div>
  <div class="rule">Champ Black · always lowercase · taglines &amp; wordmark ONLY · never UI labels/prices/headings</div>
  <div style="height:8px; border-top: 1px solid var(--hairline);"></div>
  <div class="section-label">Wordmark</div>
  <div class="wordmark" style="font-size: 2rem; color: var(--ink);">rambla</div>
  <div class="wordmark" style="font-size: 2rem; background: var(--ink); color: var(--amber); display:inline-block; padding: 4px 12px; border-radius: var(--radius-sm);">rambla</div>
</body>
</html>
