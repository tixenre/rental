<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--background); padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .section-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted-foreground); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-start; }

  /* TopBar */
  .topbar { height: 64px; border-bottom: 1px solid var(--hairline); background: rgba(252,251,247,0.95); backdrop-filter: blur(16px); display: flex; align-items: center; padding: 0 20px; gap: 12px; border-radius: 10px; }
  .topbar-logo { display: flex; align-items: center; flex-shrink: 0; }
  .date-pill { flex: 1; max-width: 340px; display: flex; align-items: center; gap: 8px; border-radius: 9999px; border: 2px solid rgba(250,180,40,0.5); background: rgba(250,180,40,0.1); padding: 7px 16px; cursor: pointer; }
  .date-pill-text { font-family: var(--font-sans); font-size: 13px; font-weight: 600; color: var(--ink); }
  .cart-btn { display: flex; align-items: center; gap: 7px; background: var(--ink); color: var(--background); border-radius: 9999px; padding: 7px 14px; font-family: var(--font-sans); font-size: 13px; font-weight: 600; cursor: pointer; }
  .user-btn { width: 36px; height: 36px; border-radius: 9999px; border: 1px solid var(--hairline); display: grid; place-items: center; cursor: pointer; }

  /* CartMiniBar */
  .cart-mini { background: rgba(252,251,247,0.98); border-top: 2px solid rgba(250,180,40,0.6); backdrop-filter: blur(16px); padding: 12px 20px; border-radius: 10px; display: flex; align-items: center; gap: 12px; box-shadow: 0 -8px 32px -8px rgba(0,0,0,0.15); }
  .cart-icon { width: 40px; height: 40px; background: var(--ink); border-radius: 9999px; display: grid; place-items: center; color: var(--background); position: relative; }
  .cart-badge { position: absolute; top: -4px; right: -4px; min-width: 20px; height: 20px; background: var(--amber); color: var(--ink); border-radius: 9999px; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 10px; font-weight: 700; padding: 0 3px; }
  .cart-info { display: flex; flex-direction: column; gap: 1px; }
  .cart-info-main { font-family: var(--font-sans); font-size: 14px; font-weight: 600; color: var(--ink); }
  .cart-info-sub { font-family: var(--font-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted-foreground); }
  .cart-total { margin-left: auto; text-align: right; }
  .cart-total-label { font-family: var(--font-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted-foreground); }
  .cart-total-value { font-family: var(--font-sans); font-size: 16px; font-weight: 600; color: var(--ink); }
  .cart-cta { background: var(--amber); color: var(--ink); border-radius: 9999px; padding: 9px 16px; font-family: var(--font-sans); font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }

  .skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--surface-elevated) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.4s ease infinite; border-radius: 8px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body>
  <div class="section-label">TopBar — default variant (desktop)</div>
  <div class="topbar">
    <div class="topbar-logo"><img src="../assets/rambla-wordmark.svg" alt="Rambla Rental" style="height:32px;width:auto;"></div>
    <div class="date-pill">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FAB428" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span class="date-pill-text">lun 2 jun. 09:00 → jue 5 jun. 18:00 · <span style="font-family:var(--font-mono);font-size:11px;color:var(--muted-foreground);">3 jornadas</span></span>
    </div>
    <div style="display:flex;gap:8px;margin-left:auto;">
      <div class="cart-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span>3 ítems</span>
      </div>
      <div class="user-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
    </div>
  </div>

  <div class="section-label">CartMiniBar — bottom fixed</div>
  <div class="cart-mini">
    <div class="cart-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <div class="cart-badge">3</div>
    </div>
    <div class="cart-info">
      <div class="cart-info-main">3 ítems</div>
      <div class="cart-info-sub">3 jornadas</div>
    </div>
    <div class="cart-total">
      <div class="cart-total-label">Total</div>
      <div class="cart-total-value">$ 73.500</div>
    </div>
    <div class="cart-cta">Ver carrito</div>
  </div>

  <div class="section-label">Skeleton shimmer</div>
  <div style="display:flex;gap:10px;">
    <div class="skeleton" style="width:160px;height:180px;border-radius:12px;"></div>
    <div style="display:flex;flex-direction:column;gap:8px;padding-top:8px;">
      <div class="skeleton" style="width:120px;height:14px;"></div>
      <div class="skeleton" style="width:80px;height:14px;"></div>
      <div class="skeleton" style="width:60px;height:20px;border-radius:4px;"></div>
    </div>
  </div>
</body>
</html>
