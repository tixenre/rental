<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rambla Rental — Styleguide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  @font-face { font-family:"TT Commons"; font-weight:400; font-display:swap; src:url("../src/assets/fonts/TT_Commons_Regular_0.otf") format("opentype"); }
  @font-face { font-family:"TT Commons"; font-weight:500; font-display:swap; src:url("../src/assets/fonts/TT_Commons_Medium_0.otf") format("opentype"); }
  @font-face { font-family:"TT Commons"; font-weight:600; font-display:swap; src:url("../src/assets/fonts/TT_Commons_DemiBold_0.otf") format("opentype"); }
  @font-face { font-family:"TT Commons"; font-weight:700; font-display:swap; src:url("../src/assets/fonts/TT_Commons_Bold_0.otf") format("opentype"); }
  @font-face { font-family:"Champ Black"; font-weight:900; font-display:swap; src:url("../src/assets/fonts/Champ-Black.ttf") format("truetype"); }

  :root{
    --amber:#FAB428; --amber-soft:color-mix(in oklch,#FAB428 18%,transparent);
    --ink:oklch(0.14 0.01 60); --background:oklch(0.985 0.005 90);
    --surface:oklch(0.97 0.008 85); --surface-elevated:oklch(1 0 0);
    --hairline:oklch(0.18 0.01 60 / 12%); --muted:oklch(0.42 0.01 70);
    --mono:"JetBrains Mono",ui-monospace,monospace;
    --sans:"TT Commons",ui-sans-serif,system-ui,sans-serif;
    --display:"Champ Black",var(--sans);
    --sidebar-w:268px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:var(--sans);background:var(--background);color:var(--ink);display:flex;overflow:hidden;-webkit-font-smoothing:antialiased;}

  /* ── Sidebar ───────────────────────────────────────────── */
  aside{width:var(--sidebar-w);flex-shrink:0;height:100vh;display:flex;flex-direction:column;
    background:var(--surface);border-right:1px solid var(--hairline);}
  .brand{padding:22px 22px 16px;display:flex;flex-direction:column;gap:4px;}
  .brand img{height:26px;width:auto;align-self:flex-start;}
  .brand .tag{font-family:var(--mono);font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin-top:8px;}
  .search{margin:0 18px 12px;display:flex;align-items:center;gap:8px;background:var(--surface-elevated);
    border:1px solid var(--hairline);border-radius:9999px;padding:8px 14px;}
  .search svg{width:14px;height:14px;color:var(--muted);flex-shrink:0;}
  .search input{border:none;outline:none;background:transparent;font-family:var(--sans);font-size:13px;color:var(--ink);width:100%;}
  .search input::placeholder{color:var(--muted);}

  nav{flex:1;overflow-y:auto;padding:4px 12px 28px;}
  nav::-webkit-scrollbar{width:8px;} nav::-webkit-scrollbar-thumb{background:var(--hairline);border-radius:8px;}
  .grp{margin-top:14px;}
  .grp-label{font-family:var(--mono);font-size:8.5px;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);
    padding:6px 10px;display:flex;align-items:center;gap:8px;}
  .grp-label .cnt{margin-left:auto;background:var(--background);border:1px solid var(--hairline);border-radius:9999px;padding:1px 7px;font-size:8px;color:var(--muted);}
  .item{display:block;width:100%;text-align:left;border:none;background:transparent;cursor:pointer;
    font-family:var(--sans);font-size:13px;color:var(--ink);padding:7px 10px;border-radius:8px;
    transition:background 120ms,color 120ms;line-height:1.3;}
  .item:hover{background:var(--surface-elevated);}
  .item.active{background:var(--ink);color:var(--background);font-weight:600;}
  .item.hidden{display:none;}
  .grp.empty{display:none;}
  .noresult{font-family:var(--mono);font-size:11px;color:var(--muted);padding:14px 12px;display:none;}

  /* ── Main ──────────────────────────────────────────────── */
  main{flex:1;display:flex;flex-direction:column;height:100vh;min-width:0;}
  .topbar{height:56px;flex-shrink:0;border-bottom:1px solid var(--hairline);background:var(--surface-elevated);
    display:flex;align-items:center;gap:16px;padding:0 20px;}
  .crumb{display:flex;align-items:baseline;gap:10px;min-width:0;}
  .crumb .g{font-family:var(--mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);flex-shrink:0;}
  .crumb .t{font-size:16px;font-weight:700;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tb-spacer{flex:1;}
  .vp{display:flex;gap:2px;background:var(--surface);border:1px solid var(--hairline);border-radius:9999px;padding:3px;}
  .vp button{border:none;background:transparent;cursor:pointer;font-family:var(--mono);font-size:10px;letter-spacing:0.06em;
    text-transform:uppercase;color:var(--muted);padding:5px 11px;border-radius:9999px;transition:all 120ms;}
  .vp button.active{background:var(--ink);color:var(--background);}
  .navbtn{width:32px;height:32px;border:1px solid var(--hairline);background:var(--surface);border-radius:9999px;cursor:pointer;
    display:grid;place-items:center;color:var(--ink);transition:all 120ms;}
  .navbtn:hover{background:var(--ink);color:var(--background);border-color:var(--ink);}
  .navbtn svg{width:15px;height:15px;}
  .openlink{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;letter-spacing:0.08em;
    text-transform:uppercase;color:var(--ink);text-decoration:none;border:1px solid var(--hairline);border-radius:9999px;padding:6px 12px;transition:all 120ms;}
  .openlink:hover{background:var(--amber);border-color:var(--amber);}

  .stage{flex:1;overflow:auto;background:
    repeating-conic-gradient(oklch(0.18 0.01 60 / 0.025) 0% 25%, transparent 0% 50%) 50% / 22px 22px;
    display:flex;justify-content:center;align-items:flex-start;padding:26px;}
  .frame-wrap{background:var(--background);box-shadow:0 12px 32px oklch(0.18 0.01 60 / 0.10),0 2px 8px oklch(0.18 0.01 60 / 0.06);
    border:1px solid var(--hairline);border-radius:14px;overflow:hidden;width:100%;max-width:100%;transition:max-width 200ms ease;}
  .frame-wrap.w-mobile{max-width:390px;} .frame-wrap.w-tablet{max-width:768px;} .frame-wrap.w-full{max-width:100%;}
  iframe{width:100%;height:calc(100vh - 56px - 52px);border:none;display:block;background:var(--background);}

  /* mobile */
  .menubtn{display:none;}
  @media (max-width:860px){
    :root{--sidebar-w:248px;}
    aside{position:fixed;z-index:40;transform:translateX(-100%);transition:transform 220ms ease;box-shadow:0 0 40px oklch(0.18 0.01 60 / 0.2);}
    body.nav-open aside{transform:translateX(0);}
    .menubtn{display:grid;place-items:center;width:32px;height:32px;border:1px solid var(--hairline);background:var(--surface);border-radius:9px;cursor:pointer;color:var(--ink);}
    .menubtn svg{width:16px;height:16px;}
    .scrim{position:fixed;inset:0;background:oklch(0.14 0.01 60 / 0.4);z-index:30;opacity:0;pointer-events:none;transition:opacity 220ms;}
    body.nav-open .scrim{opacity:1;pointer-events:auto;}
    .vp{display:none;}
  }
</style>
</head>
<body>

<aside>
  <div class="brand">
    <img src="assets/rambla-wordmark.svg" alt="rambla">
    <span class="tag">styleguide · v1.0.0</span>
  </div>
  <div class="search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="q" type="text" placeholder="Buscar…" autocomplete="off">
  </div>
  <nav id="nav"></nav>
  <div class="noresult" id="noresult">sin resultados</div>
</aside>

<div class="scrim" id="scrim"></div>

<main>
  <div class="topbar">
    <button class="menubtn" id="menubtn" aria-label="menú"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="crumb"><span class="g" id="cg">—</span><span class="t" id="ct">Styleguide</span></div>
    <div class="tb-spacer"></div>
    <div class="vp" id="vp">
      <button data-w="mobile">390</button>
      <button data-w="tablet">768</button>
      <button data-w="full" class="active">Full</button>
    </div>
    <button class="navbtn" id="prev" aria-label="anterior"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <button class="navbtn" id="next" aria-label="siguiente"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
    <a class="openlink" id="open" href="#" target="_blank" rel="noopener">↗ abrir</a>
  </div>
  <div class="stage">
    <div class="frame-wrap w-full" id="frameWrap">
      <iframe id="frame" title="preview"></iframe>
    </div>
  </div>
</main>

<script>
const CATALOG = [
  { g:"Type", items:[
    ["type-display","Display · Champ Black"],
    ["type-scale","Escala tipográfica"],
    ["type-fonts","Familias tipográficas"],
  ]},
  { g:"Colors", items:[
    ["colors-brand","Paleta de marca"],
    ["colors-status","Paleta de status"],
    ["colors-dark-mode","Dark mode"],
  ]},
  { g:"Spacing", items:[
    ["spacing-radii","Radii & spacing"],
    ["spacing-shadows-motion","Sombras & motion"],
    ["spacing-zindex","Z-index / layering"],
    ["spacing-grid-breakpoints","Grid & breakpoints"],
  ]},
  { g:"Components", items:[
    ["components-buttons","Buttons"],
    ["components-badges-stepper","Badges & Stepper"],
    ["components-priceblock","PriceBlock"],
    ["components-favbutton","FavButton"],
    ["components-inputs-statcard","Inputs & StatCard"],
    ["components-forms","Forms"],
    ["components-form-controls","Form controls"],
    ["components-searchbar","Searchbar"],
    ["components-step-indicator","Step indicator"],
    ["components-topbar","TopBar"],
    ["components-topbar-cart","TopBar + Cart"],
    ["components-cart-mini-bar","Cart mini bar"],
    ["components-cart-drawer","Cart drawer"],
    ["components-user-menu","User menu"],
    ["components-catbar","Category bar"],
    ["components-category-carousel","Category carousel"],
    ["components-mobile-nav","Mobile nav"],
    ["components-equipment-hero","Equipment hero card"],
    ["components-equipment-views","Equipment views"],
    ["components-hero","Hero"],
    ["components-footer","Footer"],
    ["components-admin-layout","Admin layout"],
    ["components-data-table","Data table"],
    ["components-dataviz","Data viz"],
    ["components-pagination-filters","Pagination & filters"],
    ["components-breadcrumbs","Breadcrumbs"],
    ["components-tabs","Tabs"],
    ["components-accordion","Accordion"],
    ["components-tooltip-popover","Tooltip & Popover"],
    ["components-dialog-confirm","Dialog / Confirm"],
    ["components-banners","Banners"],
    ["components-toast","Toast"],
    ["components-notification-panel","Notification panel"],
    ["components-empty-states","Empty states"],
    ["components-skeletons","Skeletons"],
    ["components-micro-interactions","Micro-interactions"],
    ["components-focus-a11y","Focus & A11y"],
    ["components-document-card","Document card"],
    ["components-order-timeline","Order timeline"],
    ["components-daterangepicker","Date range picker"],
    ["components-file-upload","File upload"],
    ["components-image-gallery","Image gallery"],
    ["components-content-pages","Content pages"],
    ["components-error-pages","Error pages"],
    ["components-print-styles","Print styles"],
    ["components-whatsapp-template","WhatsApp template"],
  ]},
  { g:"Brand", items:[
    ["brand-logos","Logos"],
    ["brand-iconography","Iconografía"],
    ["brand-voice-copy","Voz & copy"],
    ["brand-photography","Fotografía"],
  ]},
];

// flat lookup
const FLAT = [];
CATALOG.forEach(s => s.items.forEach(([f,t]) => FLAT.push({f,t,g:s.g})));

const nav = document.getElementById('nav');
const frame = document.getElementById('frame');
const frameWrap = document.getElementById('frameWrap');
const cg = document.getElementById('cg'), ct = document.getElementById('ct');
const openLink = document.getElementById('open');

// build nav
CATALOG.forEach(sec => {
  const grp = document.createElement('div');
  grp.className = 'grp'; grp.dataset.group = sec.g;
  const lab = document.createElement('div');
  lab.className = 'grp-label';
  lab.innerHTML = `<span>${sec.g}</span><span class="cnt">${sec.items.length}</span>`;
  grp.appendChild(lab);
  sec.items.forEach(([f,t]) => {
    const b = document.createElement('button');
    b.className = 'item'; b.dataset.file = f; b.dataset.title = t.toLowerCase();
    b.textContent = t;
    b.addEventListener('click', () => { select(f); closeNav(); });
    grp.appendChild(b);
  });
  nav.appendChild(grp);
});

let current = null;
function select(f){
  const meta = FLAT.find(x => x.f === f) || FLAT[0];
  current = meta.f;
  frame.src = `preview/${meta.f}.html`;
  cg.textContent = meta.g;
  ct.textContent = meta.t;
  openLink.href = `preview/${meta.f}.html`;
  document.querySelectorAll('.item').forEach(el => el.classList.toggle('active', el.dataset.file === meta.f));
  if (location.hash.slice(1) !== meta.f) history.replaceState(null,'',`#${meta.f}`);
  document.title = `${meta.t} — Rambla Styleguide`;
}

// viewport control
document.getElementById('vp').addEventListener('click', e => {
  const btn = e.target.closest('button'); if(!btn) return;
  document.querySelectorAll('#vp button').forEach(b => b.classList.toggle('active', b===btn));
  frameWrap.className = 'frame-wrap w-' + btn.dataset.w;
});

// prev / next
function step(d){
  const i = FLAT.findIndex(x => x.f === current);
  const n = (i + d + FLAT.length) % FLAT.length;
  select(FLAT[n].f);
  const active = document.querySelector('.item.active');
  if(active) active.scrollIntoView({block:'nearest'});
}
document.getElementById('prev').addEventListener('click', () => step(-1));
document.getElementById('next').addEventListener('click', () => step(1));
document.addEventListener('keydown', e => {
  if(e.target.tagName === 'INPUT') return;
  if(e.key === 'ArrowLeft') step(-1);
  if(e.key === 'ArrowRight') step(1);
});

// search
const q = document.getElementById('q');
const noresult = document.getElementById('noresult');
q.addEventListener('input', () => {
  const v = q.value.trim().toLowerCase();
  let any = false;
  document.querySelectorAll('.grp').forEach(grp => {
    let shown = 0;
    grp.querySelectorAll('.item').forEach(it => {
      const match = !v || it.dataset.title.includes(v) || it.dataset.file.includes(v);
      it.classList.toggle('hidden', !match);
      if(match) shown++;
    });
    grp.classList.toggle('empty', shown === 0);
    if(shown) any = true;
  });
  noresult.style.display = any ? 'none' : 'block';
});

// mobile nav
const menubtn = document.getElementById('menubtn'), scrim = document.getElementById('scrim');
function closeNav(){ document.body.classList.remove('nav-open'); }
menubtn.addEventListener('click', () => document.body.classList.toggle('nav-open'));
scrim.addEventListener('click', closeNav);

// init from hash
const initial = location.hash.slice(1);
select(FLAT.some(x => x.f === initial) ? initial : FLAT[0].f);
window.addEventListener('hashchange', () => {
  const h = location.hash.slice(1);
  if(h && h !== current && FLAT.some(x => x.f === h)) select(h);
});
</script>
</body>
</html>
