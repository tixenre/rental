name: CI

on:
  pull_request:
    branches: [main, dev]
    # Cambios solo-docs no disparan el CI (ahorro de minutos de Actions).
    # Si un PR toca código + docs, igual corre (paths-ignore solo saltea
    # cuando TODOS los archivos cambiados matchean estos globs).
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  push:
    branches: [main, dev]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

# Cancela runs viejos del mismo branch al pushear de nuevo
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  lint:
    name: Lint + formato (eslint/prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # eslint corre prettier embebido (formato = error, reglas de React = aviso)
      - run: npm run lint

  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile all Python files
        run: python -m compileall -q backend/

  python-tests:
    name: Python tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dev dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt
      - name: Run pytest
        run: |
          cd backend
          # SECRET_KEY y ADMIN_EMAILS los setea conftest.py, pero por las
          # dudas los pasamos también acá para handlers que no los lean
          # vía conftest.
          export SECRET_KEY=ci-test-secret-not-for-production
          export ADMIN_EMAILS=admin@test.com
          python -m pytest tests/ -v --tb=short

  build:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
