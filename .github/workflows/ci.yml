name: CI

on:
  pull_request:
    branches: [main, dev]
    # Cambios solo-docs no disparan el CI (ahorro de minutos de Actions).
    # Si un PR toca código + docs, igual corre (paths-ignore solo saltea
    # cuando TODOS los archivos cambiados matchean estos globs).
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  push:
    branches: [main, dev]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

# Cancela runs viejos del mismo branch al pushear de nuevo
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  no-content-images:
    name: Guardrail — cero fotos de contenido en el repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Bloquea imágenes de contenido (equipos/marcas/etc.) fuera del allowlist.
      # Fotos de contenido van a R2, no al repo. Allowlist en el propio script.
      - run: node scripts/check-no-content-images.mjs

  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    # El frontend vive en frontend/ (simétrico a backend/) → los npm corren ahí.
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      # Guardrail de ruteo: una ruta "parent" (con sub-rutas) DEBE proveer <Outlet/>,
      # si no las pantallas hijas no renderizan (bug silencioso — ver #752).
      - run: npm run check:routes

  lint:
    name: Lint + formato (eslint/prettier)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # eslint corre prettier embebido (formato = error, reglas de React = aviso)
      - run: npm run lint

  unit-tests:
    name: Unit tests (node:test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      # node:test corriendo TS nativo vía --experimental-strip-types (Node ≥22.6) — el resto
      # del frontend pinea Node 20 (setup-node de los otros jobs), este job va aparte a
      # propósito para no forzar el bump global solo por esto.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:unit

  python-syntax:
    name: Python lint + syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile all Python files
        run: python -m compileall -q backend/
      - name: Ruff (lint — caza nombres indefinidos / imports al mover código)
        run: |
          # El gate que compileall no da: F821 (nombre indefinido) / F401 al
          # refactorizar. Config conservadora en backend/ruff.toml. Versión
          # pineada (= requirements-dev.txt) para que el gate sea reproducible.
          pip install ruff==0.15.18
          cd backend && ruff check .
      - name: pip-audit (CVEs en dependencias de producción — informativo)
        # NO bloquea el merge a propósito: un CVE nuevo en una dep transitiva sin
        # fix disponible no debe frenar todos los PRs. Surfacea el hallazgo en el
        # log; el equipo decide cuándo actuar (bump / ignore puntual).
        continue-on-error: true
        run: |
          pip install pip-audit
          cd backend && pip-audit -r requirements.txt

  python-tests:
    name: Python tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dev dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt
      - name: Run pytest
        run: |
          cd backend
          # SECRET_KEY y ADMIN_EMAILS los setea conftest.py, pero por las
          # dudas los pasamos también acá para handlers que no los lean
          # vía conftest.
          export SECRET_KEY=ci-test-secret-not-for-production
          export ADMIN_EMAILS=admin@test.com
          # arca_fe/tests/ y whatsapp_cloud/tests/ viven fuera de `tests/` (son
          # paquetes portables con su propia suite) — sin esto, nunca corrían en CI.
          python -m pytest tests/ arca_fe/tests/ whatsapp_cloud/tests/ -v --tb=short

  db-migrations:
    name: Migraciones Alembic (Postgres real)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          # El nombre lleva 'test' a propósito: el guard del test se niega a
          # correr (es destructivo) si la DATABASE_URL no parece de prueba.
          POSTGRES_DB: rambla_rental_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dev dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt
      - name: Run migraciones contra Postgres real
        run: |
          cd backend
          # Corre la cadena completa de migraciones contra una BD descartable y
          # exige llegar al head. Caza roturas estructurales antes de mergear.
          export SECRET_KEY=ci-test-secret-not-for-production
          export ADMIN_EMAILS=admin@test.com
          export DATABASE_URL=postgresql://postgres:postgres@localhost:5432/rambla_rental_test
          export ALEMBIC_DB_TEST=1
          python -m pytest tests/test_alembic_upgrade_db.py -v --tb=short -m integration
      - name: Identidades de login + magic-link contra Postgres real (Fase 1 identidad)
        run: |
          cd backend
          # login_identities (lookup por sub, link/unlink scopeado, backfill de Google
          # por mail) + el backfill de la migración. Postgres real: el SQL toca UNIQUE
          # y FKs que el FakeConn no captura.
          export SECRET_KEY=ci-test-secret-not-for-production
          export ADMIN_EMAILS=admin@test.com
          export DATABASE_URL=postgresql://postgres:postgres@localhost:5432/rambla_rental_test
          export RESERVAS_DB_TEST=1
          python -m pytest tests/test_login_identities_db.py -v --tb=short -m integration
      - name: Alta passwordless → cuenta liviana contra Postgres real (Fase 4 identidad)
        run: |
          cd backend
          # Alta con passkey sin cuenta previa: NOT NULL relajados de clientes,
          # UNIQUE(email) que tolera múltiples NULL, owner_email='' en la passkey, y
          # la cuenta inerte (cliente_verificado=False) hasta Didit. El FakeConn no
          # captura los constraints reales del esquema.
          export SECRET_KEY=ci-test-secret-not-for-production
          export ADMIN_EMAILS=admin@test.com
          export DATABASE_URL=postgresql://postgres:postgres@localhost:5432/rambla_rental_test
          export RESERVAS_DB_TEST=1
          python -m pytest tests/test_clientes_livianas_db.py -v --tb=short -m integration
      - name: Tests de liquidación contra Postgres real (#88)
        run: |
          cd backend
          # Ejerce el SQL delicado del reporte de liquidación (fecha de saldado,
          # prorrateo, reparto) + la reconciliación, contra una BD descartable.
          export SECRET_KEY=ci-test-secret-not-for-production
          export ADMIN_EMAILS=admin@test.com
          export DATABASE_URL=postgresql://postgres:postgres@localhost:5432/rambla_rental_test
          export RESERVAS_DB_TEST=1
          python -m pytest tests/test_reportes_liquidacion_db.py -v --tb=short -m integration
      - name: Tests de agrupación por categoría raíz (#814)
        run: |
          cd backend
          # Ejerce el SQL recursivo que trepa de la primera categoría del equipo
          # hasta su raíz (sector) para agrupar packing list + albarán.
          export SECRET_KEY=ci-test-secret-not-for-production
          export ADMIN_EMAILS=admin@test.com
          export DATABASE_URL=postgresql://postgres:postgres@localhost:5432/rambla_rental_test
          export RESERVAS_DB_TEST=1
          python -m pytest tests/test_agrupar_categoria_db.py -v --tb=short -m integration
      - name: Concurrencia del gate de reservas contra Postgres real (núcleo sagrado)
        run: |
          cd backend
          # Núcleo SAGRADO: prueba la serialización REAL del FOR UPDATE + el conteo
          # batcheado (#626) contra Postgres — race por la última unidad y
          # overbooking en combos anidados (forward/backward/profundo). Los unit con
          # FakeConn no capturan la semántica real del lock; esto la fija en CI.
          export SECRET_KEY=ci-test-secret-not-for-production
          export ADMIN_EMAILS=admin@test.com
          export DATABASE_URL=postgresql://postgres:postgres@localhost:5432/rambla_rental_test
          export RESERVAS_DB_TEST=1
          python -m pytest tests/test_reservas_concurrency_db.py tests/test_reservas_nested_db.py -v --tb=short -m integration
      - name: Puerta única de contenido contra Postgres real (services/contenido)
        run: |
          cd backend
          # Clava que la puerta de display (contenido_de) deriva de la MISMA tabla
          # kit_componentes que el gate (== componentes_de, restringido a equipos no
          # eliminados) y que el display es 1 nivel (no la expansión recursiva del
          # stock). Garantía estructural: lo mostrado no se desincroniza de lo reservado.
          export SECRET_KEY=ci-test-secret-not-for-production
          export ADMIN_EMAILS=admin@test.com
          export DATABASE_URL=postgresql://postgres:postgres@localhost:5432/rambla_rental_test
          export RESERVAS_DB_TEST=1
          python -m pytest tests/test_contenido_puerta_db.py -v --tb=short -m integration
      - name: Calendario recursivo vía compuestos contra Postgres real (#934)
        run: |
          cd backend
          # Verifica que reservar un combo cuenta como consumo en todas las hojas
          # anidadas (combo → kit → hoja). Sin Postgres, el FOR UPDATE de psycopg2
          # y la semántica de reservado_total() no se puede ejercer.
          export SECRET_KEY=ci-test-secret-not-for-production
          export ADMIN_EMAILS=admin@test.com
          export DATABASE_URL=postgresql://postgres:postgres@localhost:5432/rambla_rental_test
          export RESERVAS_DB_TEST=1
          python -m pytest tests/test_equipo_calendario_db.py -v --tb=short -m integration
      - name: dataio read-only + round-trip contra Postgres real (#922/#862)
        run: |
          cd backend
          # #922: export no muta slugs (read-only). #862 round-trip: export→import→export
          # es byte-idéntico (export/import son inversos; el slug sobrevive el viaje).
          export SECRET_KEY=ci-test-secret-not-for-production
          export ADMIN_EMAILS=admin@test.com
          export DATABASE_URL=postgresql://postgres:postgres@localhost:5432/rambla_rental_test
          export RESERVAS_DB_TEST=1
          python -m pytest tests/test_dataio_export_readonly_db.py tests/test_dataio_roundtrip_db.py -v --tb=short -m integration
      - name: ranking_service + guard admin contra Postgres real (#862)
        run: |
          cd backend
          # ranking_service: recalcular_ranking_todos asigna score 100 al equipo con
          # pedidos, 0 al equipo sin pedidos; dry_run no muta.
          # guard anti-#55: los 53 endpoints admin de _ADMIN_EXIST devuelven 4xx
          # (auth/validación) para un no-admin — nunca 2xx (guard ausente) ni 5xx
          # (DB antes del guard, indistinguible de 403 sin Postgres).
          export SECRET_KEY=ci-test-secret-not-for-production
          export ADMIN_EMAILS=admin@test.com
          export DATABASE_URL=postgresql://postgres:postgres@localhost:5432/rambla_rental_test
          export RESERVAS_DB_TEST=1
          python -m pytest tests/test_ranking_service_db.py tests/test_routes_admin_guard_db.py -v --tb=short -m integration
      - name: Canal C de specs (propuestas + embudo que aprende) contra Postgres real (#1176 F7)
        run: |
          cd backend
          # spec_propuestas_pendientes: proponer_desde_equipo/proponer_desde_unmatched
          # encolan candidatos de spec/alias nuevos desde unmatched frecuente; el
          # CHECK constraint de `tipo` y el JSONB del payload no los captura el
          # FakeConn de los tests unit.
          export SECRET_KEY=ci-test-secret-not-for-production
          export ADMIN_EMAILS=admin@test.com
          export DATABASE_URL=postgresql://postgres:postgres@localhost:5432/rambla_rental_test
          export RESERVAS_DB_TEST=1
          python -m pytest tests/test_specs_ingesta_proponer_db.py -v --tb=short -m integration
      - name: Stream B de completitud de catálogo — enriquecer-from-html + fotos batch (#1051)
        run: |
          cd backend
          # enriquecer-from-html: mismo extractor que upload-html-source pero SIN
          # persistir en R2 — el candado real es que `equipos.html_source_url`
          # quede intacto, indistinguible con un FakeConn. fotos/from-urls: el
          # batch es best-effort (una URL que falla no aborta el resto).
          export SECRET_KEY=ci-test-secret-not-for-production
          export ADMIN_EMAILS=admin@test.com
          export DATABASE_URL=postgresql://postgres:postgres@localhost:5432/rambla_rental_test
          export RESERVAS_DB_TEST=1
          python -m pytest tests/test_stream_b_enriquecer_fotos_db.py -v --tb=short -m integration
      - name: Búsqueda de pedidos por nombre (case/acento-insensible, motor único) contra Postgres real
        run: |
          cd backend
          # Candado del bug: la búsqueda usaba LIKE crudo (case-SENSITIVE en
          # Postgres) → "tinc" no encontraba "Tincho". Sólo se prueba de verdad
          # contra una base real (necesita f_unaccent/pg_trgm del motor único).
          export SECRET_KEY=ci-test-secret-not-for-production
          export ADMIN_EMAILS=admin@test.com
          export DATABASE_URL=postgresql://postgres:postgres@localhost:5432/rambla_rental_test
          export RESERVAS_DB_TEST=1
          python -m pytest tests/test_pedidos_busqueda_db.py -v --tb=short -m integration
      - name: Dedup de inscripción a talleres + teléfono a E.164 contra Postgres real
        run: |
          cd backend
          # Candado: (1) no doble inscripción a la misma edición (2º email igual → 409);
          # (2) el teléfono se guarda en E.164 vía services.telefono. El flujo va por
          # TestClient (limiter real) + el dedup hace un SELECT bajo el FOR UPDATE de la
          # edición → sólo se prueba de verdad contra una base real.
          export SECRET_KEY=ci-test-secret-not-for-production
          export ADMIN_EMAILS=admin@test.com
          export DATABASE_URL=postgresql://postgres:postgres@localhost:5432/rambla_rental_test
          export RESERVAS_DB_TEST=1
          python -m pytest tests/test_talleres_inscripcion_db.py -v --tb=short -m integration

  e2e-admin:
    name: E2E admin (Playwright + backend real)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rambla_rental_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias del backend
        run: |
          cd backend
          pip install -r requirements.txt

      # admin-equipos-form.spec.ts (#1263) se auto-skipea sin PLAYWRIGHT_ADMIN=1,
      # que a su vez necesita un backend real con ADMIN_BYPASS_AUTH=1 (dev-only —
      # se ignora solo si RAILWAY_ENVIRONMENT=production, ver auth/session.py).
      # Sin este job, esos tests (los nets de hidratación de la Fase 1 + el fix
      # de Pegar HTML de la Fase 0) solo corrían si alguien se acordaba de
      # correr `npm run test:admin` a mano con el backend levantado.
      - name: Levantar el backend (ADMIN_BYPASS_AUTH=1, Postgres real)
        working-directory: backend
        run: |
          nohup uvicorn main:app --port 8000 > /tmp/backend.log 2>&1 &
          disown
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rambla_rental_test
          SECRET_KEY: ci-test-secret-not-for-production
          ADMIN_EMAILS: admin@test.com
          ADMIN_BYPASS_AUTH: "1"

      - name: Esperar a que init_db() termine y el backend responda contra Postgres real
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/equipos > /dev/null; then
              echo "Backend listo"
              exit 0
            fi
            sleep 2
          done
          echo "El backend no respondió a tiempo:"
          cat /tmp/backend.log
          exit 1

      # init_db()/Alembic crean el esquema pero NO siembran el árbol de
      # categorías del catálogo (a diferencia del registry de specs, que sí se
      # siembra en boot) — en un dev DB normal se acumulan con el uso; una DB
      # de CI arranca en cero. Sin esto, "Categorías del catálogo" no tiene
      # ningún botón para clickear y varios tests cuelgan 30s c/u.
      - name: Seedear 1 categoría mínima (el árbol de catálogo no viene en init_db())
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d rambla_rental_test \
            -c "INSERT INTO categorias (nombre) VALUES ('Cámaras') ON CONFLICT (nombre) DO NOTHING;"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # Mismo cache que mobile-smoke.yml (browsers de Playwright, ~100 MB).
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      # El webServer de playwright.config.ts levanta el frontend solo (npm run
      # dev) — acá solo faltaba el backend, que ya está arriba desde el paso
      # anterior. Mismo filtro que test:admin en package.json.
      - name: Run admin e2e tests
        working-directory: frontend
        run: PLAYWRIGHT_ADMIN=1 npx playwright test admin-
        env:
          CI: true

      - name: Backend logs (si algo falló)
        if: failure()
        run: cat /tmp/backend.log || true

  build:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      # Gate de lockfile bun: Railway buildea con `bun install --frozen-lockfile`
      # (bun.lock), mientras el resto del CI usa npm (package-lock.json). Sin este
      # check, un dep agregado a package.json sin regenerar bun.lock pasa el CI pero
      # ROMPE el deploy de staging (cazado: #1095 sumó @simplewebauthn sin tocar
      # bun.lock → "lockfile had changes, but lockfile is frozen"). Corre el MISMO
      # check que Railway, en seco (sin instalar), antes del build.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile --dry-run
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      # Budget de performance: falla si el bundle supera los umbrales de .size-limit.json
      # (entry/vendors/CSS, brotli). Frena el "engorde silencioso" del peso de la web.
      - run: npm run size
