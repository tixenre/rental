name: Docs lint

# El CI de código (ci.yml) IGNORA los cambios de docs (paths-ignore: **/*.md, docs/**),
# así que el drift documental nunca se cazaba. Este workflow cubre justo ese hueco: corre
# SOLO cuando cambian docs o el sistema de gobernanza (.claude/**), y valida con
# scripts/check-docs.mjs (paridad digest↔log, import presente, links vivos, paridad
# skills↔registro y linter de frontmatter de skills).
on:
  pull_request:
    branches: [main, dev]
    paths:
      - "**/*.md"
      - ".claude/**"
      - "scripts/check-docs.mjs"
      - ".github/workflows/docs-lint.yml"
      # Guardrail Bloque 6 (vitrina del DS): un componente nuevo en design-system/ o
      # un cambio en el catálogo deben re-verificar la cobertura, o el anti-drift no se arma.
      - "frontend/src/design-system/**"
      - "frontend/src/components/admin/ds-catalog/**"
  push:
    branches: [main, dev]
    paths:
      - "**/*.md"
      - ".claude/**"
      - "scripts/check-docs.mjs"
      - ".github/workflows/docs-lint.yml"
      # Guardrail Bloque 6 (vitrina del DS): un componente nuevo en design-system/ o
      # un cambio en el catálogo deben re-verificar la cobertura, o el anti-drift no se arma.
      - "frontend/src/design-system/**"
      - "frontend/src/components/admin/ds-catalog/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-docs:
    name: Drift de docs de gobernanza
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Sin deps: check-docs.mjs usa solo módulos nativos de Node → no hace falta npm ci.
      - run: node scripts/check-docs.mjs
